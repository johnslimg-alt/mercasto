name: Deploy to Production

on:
  push:
    branches:
      - main # Воркфлоу запустится при пуше в эту ветку

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Execute deployment script via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          # Скрипт, который будет выполнен прямо на вашем сервере
          script: |
            # Переходим в папку с проектом
            cd /var/www/mercasto
            
            # 1. Получаем свежий код из репозитория
            git pull origin main
            
            # 2. Собираем бэкенд (Laravel)
            cd backend
            composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            
            # 3. Собираем фронтенд (React + Vite)
            cd ..
            npm install
            npm run build