server {
    listen 80;
    server_name _;
    
    # Разрешаем Certbot проверять владение доменом (HTTP-01 challenge)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Все остальные запросы перенаправляем на HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name mercasto.com www.mercasto.com api.mercasto.com;

    # SSL certificate paths (mounted from host /etc/letsencrypt)
    ssl_certificate /etc/letsencrypt/live/mercasto.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mercasto.com/privkey.pem;

    # Modern SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Hide nginx version from attack surface
    server_tokens off;

    # Match PHP upload runtime limits and leave room for Laravel video validation.
    client_max_body_size 64m;

    # Security headers
    include /etc/nginx/conf.d/security_headers.conf;

    # Gzip compression
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/manifest+json
        image/svg+xml
        font/ttf
        font/otf;

    charset utf-8;

    # Keep common scanner/probe paths out of the SPA fallback.
    location ~ /\.(?!well-known) {
        return 404;
    }

    location ~* ^/(backend/)?(\.env.*|\.git|\.aws|composer\.(json|lock)|package(-lock)?\.json|pnpm-lock\.yaml|yarn\.lock|vite\.config\.(js|ts|mjs)|tailwind\.config\.(js|ts|mjs)|config\.json|js/config\.js|env)$ {
        return 404;
    }

    location ~* ^/(backend|vendor|server-status|nginx_status)(/.*)?$ {
        return 404;
    }

    location ~* ^/(horizon|vendor/horizon)(/.*)?$ {
        return 404;
    }

    # Retire stale/demo URLs that were indexed before the Mexico-wide launch.
    location ~* ^/(ru|20-ninos|contact-us)(/)?$ {
        return 410;
    }

    location ~* ^/listing/ {
        return 301 /;
    }

    # 1. Frontend SPA (React)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        include /etc/nginx/conf.d/security_headers.conf;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # 1.5. Cache immutable frontend build assets aggressively.
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        include /etc/nginx/conf.d/security_headers.conf;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
        try_files $uri @stale_frontend_asset;
    }

    # Old tabs/service workers may request deleted Vite chunks after a deploy.
    # Return a valid JS module that refreshes the app instead of HTML/immutable 404.
    location @stale_frontend_asset {
        root /usr/share/nginx/html;
        expires off;
        include /etc/nginx/conf.d/security_headers.conf;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        rewrite ^ /stale-module.js break;
    }

    location = /stale-module.js {
        root /usr/share/nginx/html;
        expires off;
        include /etc/nginx/conf.d/security_headers.conf;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    location = /sw.js {
        root /usr/share/nginx/html;
        expires off;
        include /etc/nginx/conf.d/security_headers.conf;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # Dynamic SEO sitemaps are generated by Laravel, not by the SPA.
    location ~ ^/sitemap(?:-(?:main|categories|states|ads))?\.xml$ {
        root /var/www/public;
        rewrite ^ /index.php last;
        include /etc/nginx/conf.d/security_headers.conf;
        add_header Cache-Control "public, max-age=1800" always;
    }

    # 2. Serve uploaded media directly (bypass PHP)
    location /storage/ {
        alias /var/www/storage/app/public/;
        try_files $uri $uri/ =404;
        # Cache static assets
        expires 30d;
        include /etc/nginx/conf.d/security_headers.conf;
        add_header Cache-Control "public, no-transform" always;
    }

    # 2.5. Laravel health endpoint must bypass the SPA shell
    location = /up {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # 3. Route API and server-rendered share pages to Laravel
    location ~ ^/(api|webhooks|broadcasting|sanctum|graphql|share) {
        root /var/www/public;
        try_files $uri $uri/ /index.php?$query_string;
        include /etc/nginx/conf.d/security_headers.conf;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # 4. PHP-FPM backend handler
    location ~ \.php$ {
        root /var/www/public;
        fastcgi_pass mercasto-backend:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 60;
        include fastcgi_params;
    }

    # 5. WebSockets (Reverb)
    location /app {
        proxy_pass http://mercasto-reverb:8082;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $http_host;
        proxy_read_timeout 60s;
    }
}
