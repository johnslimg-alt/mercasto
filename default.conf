server {
    listen 80;
    server_name _;
    
    # Перенаправление всего HTTP трафика на HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name mercasto.com www.mercasto.com api.mercasto.com;

    # Укажите пути к сертификатам (пробрасываются из /etc/letsencrypt хост-машины)
    ssl_certificate /etc/letsencrypt/live/mercasto.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mercasto.com/privkey.pem;

    # Заголовки безопасности
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    charset utf-8;

    # 1. Раздача фронтенда (React SPA)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. Раздача загруженных медиафайлов напрямую, минуя PHP
    location /storage/ {
        alias /var/www/storage/app/public/;
        try_files $uri $uri/ =404;
    }

    # 3. Маршрутизация запросов к API Laravel
    location ~ ^/(api|webhooks|broadcasting|sanctum|graphql|horizon|vendor/horizon) {
        root /var/www/public;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # 4. Обработка PHP через PHP-FPM бэкенд-контейнера
    location ~ \.php$ {
        root /var/www/public;
        fastcgi_pass mercasto-backend:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # 5. Проксирование WebSockets (Reverb)
    location /app {
        proxy_pass http://mercasto-backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $http_host;
    }
}