server {
    listen 80;
    server_name _;
    
    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name mercasto.com www.mercasto.com api.mercasto.com;

    # SSL certificate paths (mounted from host /etc/letsencrypt)
    ssl_certificate /etc/letsencrypt/live/mercasto.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mercasto.com/privkey.pem;

    # Modern SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Hide nginx version from attack surface
    server_tokens off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    client_max_body_size 25m;

    charset utf-8;

    # 1. Frontend SPA (React)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. Serve uploaded media directly (bypass PHP)
    location /storage/ {
        alias /var/www/storage/app/public/;
        try_files $uri $uri/ =404;
        # Cache static assets
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # 3. Route API requests to Laravel
    location ~ ^/(api|webhooks|broadcasting|sanctum|graphql|horizon|vendor/horizon) {
        root /var/www/public;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # 4. PHP-FPM backend handler
    location ~ \.php$ {
        root /var/www/public;
        fastcgi_pass mercasto-backend:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 60;
        include fastcgi_params;
    }

    # 5. WebSockets (Reverb)
    location /app {
        proxy_pass http://mercasto-reverb:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $http_host;
        proxy_read_timeout 60s;
    }
}