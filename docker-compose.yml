version: '3.9'

services:
  # --- BACKEND LARAVEL ---
  mercasto-backend:
    container_name: mercasto_backend_container
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    image: mercasto-backend:latest
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
      - backend_storage:/var/www/html/storage
    networks:
      - mercasto
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    # ВЕЩЬ №1: HEALTHCHECK
    healthcheck:
      test: ["CMD", "php", "artisan", "tinker", "--execute=echo 'ok';"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    # ВЕЩЬ №2: DEPLOY для будущего swarm / zero-downtime
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --- FRONTEND ---
  mercasto-frontend:
    container_name: mercasto_frontend_container
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    image: mercasto-frontend:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend:/app
      - frontend_node:/app/node_modules
    networks:
      - mercasto
    depends_on:
      mercasto-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 15s
      timeout: 3s
      retries: 3

  # --- WORKER ---
  mercasto-worker:
    container_name: mercasto_worker_container
    image: mercasto-backend:latest
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
      - backend_storage:/var/www/html/storage
    networks:
      - mercasto
    depends_on:
      - redis
      - mysql

  # --- SCHEDULER ---
  mercasto-scheduler:
    container_name: mercasto_scheduler_container
    image: mercasto-backend:latest
    restart: unless-stopped
    command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/var/www/html
    networks:
      - mercasto
    depends_on:
      - redis

  # --- REVERB WEBSOCKETS ---
  mercasto-reverb:
    container_name: mercasto_reverb_container
    image: mercasto-backend:latest
    restart: unless-stopped
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    networks:
      - mercasto
    depends_on:
      - redis

  # --- MYSQL ---
  mysql:
    image: mysql:8.0
    container_name: mercasto_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - mercasto
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: --default-authentication-plugin=mysql_native_password

  # --- REDIS ---
  redis:
    image: redis:7-alpine
    container_name: mercasto_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - mercasto
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  mercasto:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  backend_vendor:
  backend_storage:
  frontend_node:
