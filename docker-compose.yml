version: '3.8'

services:
  # Автоматический перезапуск зависших (unhealthy) контейнеров
  autoheal:
    image: willfarrell/autoheal
    container_name: autoheal
    environment:
      - AUTOHEAL_CONTAINER_LABEL=all
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always

  # Frontend (Nginx)
  mercasto-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mercasto_frontend_container
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt
      - ./backend:/var/www # Для раздачи статики Laravel (storage) и доступа к index.php
    restart: unless-stopped
    depends_on:
      mercasto-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend (Laravel + PHP-FPM)
  mercasto-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mercasto_backend_container
    volumes:
      - ./backend:/var/www
      - /var/www/vendor # Защищаем системные библиотеки от перезаписи
    environment:
      - "DB_HOST=mysql" # Указываем, что БД находится в другом контейнере
      - "REDIS_HOST=redis" # Связываем с контейнером Redis
      # ... другие переменные из вашего .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # База данных
  mysql:
    image: mysql:8.0
    container_name: mercasto_db_container
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: mercasto_db_name
      MYSQL_USER: your_db_user
      MYSQL_PASSWORD: your_db_password
      MYSQL_ROOT_PASSWORD: your_root_password
    volumes:
      - ./mysql-data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pyour_root_password"]
      interval: 15s
      timeout: 5s
      retries: 5

  # Redis (Кэш и очереди)
  redis:
    image: redis:7-alpine
    container_name: mercasto_redis_container
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  # Мониторинг ресурсов (cAdvisor)
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    ports:
      - "8081:8080" # Интерфейс мониторинга будет доступен на порту 8081 (чтобы не конфликтовать с Reverb)
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    restart: unless-stopped

  # Prometheus (Сбор метрик контейнеров)
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - cadvisor
    restart: unless-stopped

  # Grafana (Продвинутая визуализация метрик и логов)
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=mercasto_secure_pass # Измените пароль для продакшена!
    depends_on:
      - prometheus
    restart: unless-stopped