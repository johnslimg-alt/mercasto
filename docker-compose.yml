# docker-compose.yml — production ready for self-hosted runner

services:
  autoheal:
    image: willfarrell/autoheal:latest
    container_name: autoheal
    environment:
      - AUTOHEAL_CONTAINER_LABEL=all
      - AUTOHEAL_INTERVAL=30
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always

  mercasto-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    container_name: mercasto_frontend_container
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot
      - ./backend:/var/www:ro
    restart: unless-stopped
    depends_on:
      mercasto-backend:
        condition: service_healthy
    # УЛУЧШЕНИЕ 1: реальный healthcheck
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    labels:
      - autoheal=true

  mercasto-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    container_name: mercasto_backend_container
    volumes:
      - ./backend:/var/www
      - /var/www/vendor
    environment:
      - "DB_HOST=postgres"
      - "REDIS_HOST=redis"
      - "REDIS_PASSWORD=${REDIS_PASSWORD:-mercasto_secure_redis_2026}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    # УЛУЧШЕНИЕ 1: healthcheck проверяет PHP + БД
    healthcheck:
      test: ["CMD-SHELL", "php artisan tinker --execute='DB::connection()->getPdo();' || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 40s
    # УЛУЧШЕНИЕ 2: deploy policy для self-hosted
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    labels:
      - autoheal=true

  mercasto-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mercasto_worker_container
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - ./backend:/var/www
      - /var/www/vendor
    environment:
      - "DB_HOST=postgres"
      - "REDIS_HOST=redis"
      - "REDIS_PASSWORD=${REDIS_PASSWORD:-mercasto_secure_redis_2026}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
    labels:
      - autoheal=true

  mercasto-scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mercasto_scheduler_container
    command: php artisan schedule:work
    volumes:
      - ./backend:/var/www
      - /var/www/vendor
    environment:
      - "DB_HOST=postgres"
      - "REDIS_HOST=redis"
      - "REDIS_PASSWORD=${REDIS_PASSWORD:-mercasto_secure_redis_2026}"
    depends_on:
      - redis
    restart: unless-stopped
    labels:
      - autoheal=true

  mercasto-reverb:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mercasto_reverb_container
    command: php artisan reverb:start --host=0.0.0.0 --port=8082
    expose:
      - "8082"
    volumes:
      - ./backend:/var/www
      - /var/www/vendor
    environment:
      - "DB_HOST=postgres"
      - "REDIS_HOST=redis"
      - "REDIS_PASSWORD=${REDIS_PASSWORD:-mercasto_secure_redis_2026}"
    depends_on:
      - redis
    restart: unless-stopped
    labels:
      - autoheal=true

  postgres:
    image: pgvector/pgvector:pg18
    container_name: mercasto_db_container
    expose:
      - "5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-mercasto}
      POSTGRES_USER: ${DB_USERNAME:-mercasto_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-mercasto_user} -d ${DB_DATABASE:-mercasto}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db-backup:
    image: pgvector/pgvector:pg18
    container_name: mercasto_db_backup
    environment:
      PGPASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - ./postgres-backups:/backups
    entrypoint: >
      /bin/bash -c "
      while true; do
        FILE=/backups/backup_$$(date +%Y%m%d_%H%M).dump;
        pg_dump -h postgres -U ${DB_USERNAME:-mercasto_user} -d ${DB_DATABASE:-mercasto} -F c -f $$FILE && echo \"Backup: $$FILE\";
        find /backups -type f -mtime +7 -delete;
        sleep 86400;
      done"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: mercasto_redis_container
    command: redis-server --requirepass ${REDIS_PASSWORD:-mercasto_secure_redis_2026} --appendonly yes
    expose:
      - "6379"
    volumes:
      - ./redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-mercasto_secure_redis_2026}", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    expose: ["8080"]
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    expose: ["9090"]
    depends_on: [cadvisor]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    ports: ["127.0.0.1:3000:3000"]
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-mercasto_secure_admin_993}
    depends_on: [prometheus]
    restart: unless-stopped

  certbot:
    image: certbot/certbot:v2.10.0
    container_name: certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped
