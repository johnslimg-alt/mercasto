# docker-compose.yml — version key removed (deprecated in Compose v2+)

services:
  # Автоматический перезапуск зависших (unhealthy) контейнеров
  autoheal:
    image: willfarrell/autoheal
    container_name: autoheal
    environment:
      - AUTOHEAL_CONTAINER_LABEL=all
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always

  # Frontend (Nginx)
  mercasto-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mercasto_frontend_container
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot # Папка для проверки владения доменом
      - ./backend:/var/www # Для раздачи статики Laravel (storage) и доступа к index.php
    restart: unless-stopped
    depends_on:
      mercasto-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # Backend (Laravel + PHP-FPM)
  mercasto-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mercasto_backend_container
    volumes:
      - ./backend:/var/www
      - /var/www/vendor # Защищаем системные библиотеки от перезаписи
    environment:
      - "DB_HOST=postgres" # Указываем, что БД находится в другом контейнере
      - "REDIS_HOST=redis" # Связываем с контейнером Redis
      - "REDIS_PASSWORD=${REDIS_PASSWORD:-mercasto_secure_redis_2026}"
      # ... другие переменные из вашего .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # Laravel Queue Worker (Фоновая отправка писем, обработка видео и т.д.)
  mercasto-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mercasto_worker_container
    command: php artisan queue:work --sleep=3 --tries=3
    volumes:
      - ./backend:/var/www
    environment:
      - "DB_HOST=postgres"
      - "REDIS_HOST=redis"
      - "REDIS_PASSWORD=${REDIS_PASSWORD:-mercasto_secure_redis_2026}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Laravel Scheduler (Автоматическое выполнение задач по расписанию - CRON)
  mercasto-scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mercasto_scheduler_container
    command: php artisan schedule:work
    volumes:
      - ./backend:/var/www
    environment:
      - "DB_HOST=postgres"
      - "REDIS_HOST=redis"
      - "REDIS_PASSWORD=${REDIS_PASSWORD:-mercasto_secure_redis_2026}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Laravel Reverb (Сервер WebSockets для уведомлений в реальном времени)
  mercasto-reverb:
    profiles:
      - realtime
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mercasto_reverb_container
    command: php artisan reverb:start --host=0.0.0.0 --port=8082
    ports:
      - "8082:8082"
    volumes:
      - ./backend:/var/www
    environment:
      - "REDIS_PASSWORD=${REDIS_PASSWORD:-mercasto_secure_redis_2026}"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # База данных
  postgres:
    image: pgvector/pgvector:pg18
    container_name: mercasto_db_container
    expose:
      - "5432" # Закрыто от интернета, доступно только внутри Docker
    environment:
      POSTGRES_DB: ${DB_DATABASE:-mercasto}
      POSTGRES_USER: ${DB_USERNAME:-mercasto_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - ./postgres-data:/var/lib/postgresql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-mercasto_user} -d ${DB_DATABASE:-mercasto}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis (Кэш и очереди)
  redis:
    image: redis:7-alpine
    container_name: mercasto_redis_container
    command: redis-server --requirepass ${REDIS_PASSWORD:-mercasto_secure_redis_2026} --appendonly yes
    expose:
      - "6379" # Закрыто от интернета
    volumes:
      - ./redis-data:/data # ЗАЩИТА ОТ ПОТЕРИ ДАННЫХ: Сохраняем кэш и очереди при рестартах
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-mercasto_secure_redis_2026}", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Мониторинг ресурсов (cAdvisor)
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    expose:
      - "8080" # Скрыто от интернета. Доступно только внутренним контейнерам (Grafana и Prometheus)
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    restart: unless-stopped

  # Prometheus (Сбор метрик контейнеров)
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    expose:
      - "9090" # Скрыто от интернета.
    depends_on:
      - cadvisor
    restart: unless-stopped

  # Grafana (Продвинутая визуализация метрик и логов)
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "127.0.0.1:3000:3000" # Доступно только локально. Настройте Nginx Basic Auth для внешнего доступа
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-mercasto_secure_admin_993}
    depends_on:
      - prometheus
    restart: unless-stopped

  # Certbot (Автоматический выпуск и продление SSL-сертификатов Let's Encrypt)
  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped
