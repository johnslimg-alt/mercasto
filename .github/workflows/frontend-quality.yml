name: Frontend Quality Gate

on:
  workflow_dispatch:
  schedule:
    - cron: '11 14 * * *'
  push:
    branches:
      - main
    paths:
      - 'index.html'
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.*'
      - 'tailwind.config.*'
      - '.github/workflows/frontend-quality.yml'
      - 'scripts/i18n-audit.mjs'
      - 'scripts/check-recovery-guards.mjs'
      - 'scripts/public-copy-scan.sh'
      - 'scripts/fix-public-copy-fallbacks.sh'
      - 'scripts/apply-production-hotfixes.sh'
  pull_request:
    branches:
      - main
    paths:
      - 'index.html'
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.*'
      - 'tailwind.config.*'
      - '.github/workflows/frontend-quality.yml'
      - 'scripts/i18n-audit.mjs'
      - 'scripts/check-recovery-guards.mjs'
      - 'scripts/public-copy-scan.sh'
      - 'scripts/fix-public-copy-fallbacks.sh'
      - 'scripts/apply-production-hotfixes.sh'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: frontend-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Build and recovery checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run recovery guards
        run: npm run check:recovery
      - name: Audit translations
        run: npm run i18n:audit
      - name: Run frontend lint gate
        run: npm run lint:ci
      - name: Run public copy scan
        run: bash scripts/public-copy-scan.sh
      - name: Build frontend
        run: npm run build
