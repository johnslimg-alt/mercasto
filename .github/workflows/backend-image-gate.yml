name: Backend Image Gate

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docker-compose.yml'
      - 'docker-compose.override.yml'
      - '.github/workflows/backend-image-gate.yml'

permissions:
  contents: read

concurrency:
  group: backend-image-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-image:
    name: Validate and build backend image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Check backend Dockerfile invariants
        shell: bash
        run: |
          set -euo pipefail
          test -f backend/Dockerfile
          grep -n '^FROM php:8\.4-fpm' backend/Dockerfile
          grep -n 'composer.lock is required for production build' backend/Dockerfile
          grep -n 'upload_max_filesize=10M' backend/Dockerfile
          grep -n 'post_max_size=25M' backend/Dockerfile
          grep -n 'max_file_uploads=12' backend/Dockerfile
          grep -n 'expose_php=0' backend/Dockerfile
          grep -n 'HEALTHCHECK .*php-fpm -t' backend/Dockerfile

      - name: Validate compose files
        shell: bash
        run: |
          set -euo pipefail
          docker compose config >/tmp/mercasto_compose_base.out
          docker compose -f docker-compose.yml -f docker-compose.override.yml config >/tmp/mercasto_compose_override.out

      - name: Build backend image
        shell: bash
        run: |
          set -euo pipefail
          docker compose -f docker-compose.yml -f docker-compose.override.yml build mercasto-backend
