name: Deploy Mercasto

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read
  statuses: write

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 60

    steps:
      - name: Обновить код
        run: |
          set -euo pipefail
          cd /var/www/mercasto
          docker exec mercasto_backend_container php artisan up || true
          # sudo: el checkout de producción pertenece a root; el runner is github-runner
          sudo -n git fetch origin
          sudo -n git reset --hard origin/main
          sudo -n git clean -fd
          sudo -n rm -f backend/bootstrap/cache/*.php

          # backend/.env may be root-only. Copy it through the already-running
          # backend container into a runner-private temporary file without
          # weakening the persistent secret file permissions.
          umask 077
          docker exec mercasto_backend_container cat /var/www/.env > "$RUNNER_TEMP/mercasto-backend.env"

      - name: Миграции
        run: |
          set -euo pipefail
          cd /var/www/mercasto
          sudo -n rm -f backend/bootstrap/cache/*.php
          docker exec mercasto_backend_container php artisan migrate --force

      - name: Собрать, проверить и поднять
        env:
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          cd /var/www/mercasto
          COMPOSE_ENV_FILE="$RUNNER_TEMP/mercasto-backend.env"
          test -s "$COMPOSE_ENV_FILE"

          CHANGED_FILES=""
          if [ -n "${BEFORE_SHA:-}" ] && git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
            CHANGED_FILES="$(git diff --name-only "$BEFORE_SHA" "$CURRENT_SHA")"
          fi

          add_service() {
            case " $BUILD_SERVICES " in
              *" $1 "*) ;;
              *) BUILD_SERVICES="$BUILD_SERVICES $1" ;;
            esac
          }

          BUILD_SERVICES=""
          UP_SERVICES=""

          if [ -z "$CHANGED_FILES" ]; then
            BUILD_SERVICES="mercasto-frontend mercasto-backend"
            UP_SERVICES="mercasto-frontend mercasto-backend mercasto-worker mercasto-scheduler mercasto-reverb"
          else
            echo "$CHANGED_FILES"
            if printf '%s\n' "$CHANGED_FILES" | grep -Eq '^(Dockerfile|src/|public/|index.html|package\.json|package-lock\.json|vite\.config|tailwind\.config|postcss\.config|default\.conf|security_headers\.conf|scripts/verify-vite-dist\.mjs|\.github/workflows/(deploy|deploy-selfhosted)\.yml$)'; then
              add_service mercasto-frontend
              UP_SERVICES="$UP_SERVICES mercasto-frontend"
            fi
            if printf '%s\n' "$CHANGED_FILES" | grep -Eq '^(backend/Dockerfile|backend/composer\.(json|lock)|backend/package(-lock)?\.json|backend/vite\.config)'; then
              add_service mercasto-backend
              UP_SERVICES="$UP_SERVICES mercasto-backend mercasto-worker mercasto-scheduler mercasto-reverb"
            fi
          fi

          if [ -n "$BUILD_SERVICES" ]; then
            docker compose --env-file "$COMPOSE_ENV_FILE" build --parallel $BUILD_SERVICES
          else
            echo "No Docker rebuild required for changed files."
          fi

          case " $BUILD_SERVICES " in
            *" mercasto-frontend "*)
              image_id=$(docker compose --env-file "$COMPOSE_ENV_FILE" images -q mercasto-frontend)
              if [ -z "$image_id" ]; then
                echo "Built frontend image was not found."
                exit 1
              fi

              dist_dir="$RUNNER_TEMP/mercasto-dist-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
              rm -rf "$dist_dir"
              mkdir -p "$dist_dir"

              container_id=$(docker create "$image_id")
              cleanup_container() {
                docker rm -f "$container_id" >/dev/null 2>&1 || true
              }
              trap cleanup_container EXIT
              docker cp "$container_id:/usr/share/nginx/html/." "$dist_dir/"
              cleanup_container
              trap - EXIT

              docker run --rm \
                -v "/var/www/mercasto/scripts/verify-vite-dist.mjs:/verify-vite-dist.mjs:ro" \
                -v "$dist_dir:/dist:ro" \
                node:22-alpine \
                node /verify-vite-dist.mjs /dist

              echo "FRONTEND_DIST_DIR=$dist_dir" >> "$GITHUB_ENV"
              ;;
          esac

          FRONTEND_UP=0
          OTHER_UP_SERVICES=""
          for service in $UP_SERVICES; do
            if [ "$service" = "mercasto-frontend" ]; then
              FRONTEND_UP=1
            else
              OTHER_UP_SERVICES="$OTHER_UP_SERVICES $service"
            fi
          done

          if [ -n "$OTHER_UP_SERVICES" ]; then
            docker compose --env-file "$COMPOSE_ENV_FILE" up -d --no-build --no-deps $OTHER_UP_SERVICES
          fi

          if [ "$FRONTEND_UP" -eq 1 ]; then
            docker compose --env-file "$COMPOSE_ENV_FILE" up -d --no-build --no-deps --force-recreate mercasto-frontend
          fi

          if [ -z "$OTHER_UP_SERVICES" ] && [ "$FRONTEND_UP" -eq 0 ]; then
            echo "No service restart required for changed files."
          fi

          case " $UP_SERVICES " in
            *" mercasto-backend "*) docker compose --env-file "$COMPOSE_ENV_FILE" exec -T mercasto-frontend nginx -s reload || true ;;
          esac

      - name: Кэш и очереди
        run: |
          set -euo pipefail
          cd /var/www/mercasto
          COMPOSE_ENV_FILE="$RUNNER_TEMP/mercasto-backend.env"
          test -s "$COMPOSE_ENV_FILE"

          docker exec mercasto_backend_container php artisan optimize:clear
          docker exec mercasto_backend_container php artisan optimize
          docker exec mercasto_backend_container php artisan queue:restart
          docker exec mercasto_backend_container php artisan up
          docker restart mercasto_backend_container mercasto_worker_container mercasto_scheduler_container mercasto_reverb_container || true
          docker start mercasto_reverb_container || true
          docker exec mercasto_backend_container getent hosts mercasto-reverb >/dev/null 2>&1 || {
            docker network disconnect mercasto_default mercasto_reverb_container 2>/dev/null || true
            docker network connect --alias mercasto-reverb --alias mercasto_reverb_container mercasto_default mercasto_reverb_container || true
          }
          docker compose --env-file "$COMPOSE_ENV_FILE" restart mercasto-frontend

          for attempt in $(seq 1 30); do
            if curl -fsS --max-time 5 https://mercasto.com/api/auth/providers >/dev/null; then
              exit 0
            fi
            sleep 3
          done

          curl -fsS --max-time 10 https://mercasto.com/api/auth/providers >/dev/null

      - name: Verify production frontend bundle
        id: verify_frontend_bundle
        continue-on-error: true
        run: |
          set -euo pipefail

          if [ -z "${FRONTEND_DIST_DIR:-}" ]; then
            echo "Frontend bundle unchanged; production asset verification skipped."
            echo "summary=Frontend bundle unchanged" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          live_dir="$RUNNER_TEMP/mercasto-live-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          rm -rf "$live_dir"
          mkdir -p "$live_dir"
          echo "FRONTEND_LIVE_DIR=$live_dir" >> "$GITHUB_ENV"

          curl_args=(
            --fail
            --silent
            --show-error
            --location
            --retry 5
            --retry-delay 2
            --retry-all-errors
            --max-time 30
            -H 'Cache-Control: no-cache'
            -H 'Accept-Encoding: identity'
          )

          curl "${curl_args[@]}" "https://mercasto.com/?deploy=${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" -o "$live_dir/index.html"
          if ! cmp -s "$FRONTEND_DIST_DIR/index.html" "$live_dir/index.html"; then
            echo "Production index.html does not match the deployed frontend image."
            diff -u "$FRONTEND_DIST_DIR/index.html" "$live_dir/index.html" | head -200 || true
            echo "summary=Production index.html does not match deployed image" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          checked=0
          while IFS= read -r relative_path; do
            target="$live_dir/$relative_path"
            mkdir -p "$(dirname "$target")"
            curl "${curl_args[@]}" "https://mercasto.com/${relative_path}?deploy=${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" -o "$target"

            if ! cmp -s "$FRONTEND_DIST_DIR/$relative_path" "$target"; then
              echo "Production asset differs from deployed image: $relative_path"
              echo "summary=Production asset mismatch: $relative_path" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            checked=$((checked + 1))
          done < <(cd "$FRONTEND_DIST_DIR" && find assets -type f -print | sort)

          if [ "$checked" -eq 0 ]; then
            echo "No production Vite assets were checked."
            echo "summary=No production Vite assets were checked" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "Production bundle verified: index.html and $checked assets match the deployed image."
          echo "summary=Production frontend verified: $checked assets" >> "$GITHUB_OUTPUT"

      - name: Publish frontend asset deploy status
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERIFY_OUTCOME: ${{ steps.verify_frontend_bundle.outcome }}
          VERIFY_SUMMARY: ${{ steps.verify_frontend_bundle.outputs.summary }}
        run: |
          set -euo pipefail

          if [ "$VERIFY_OUTCOME" = "success" ]; then
            STATE="success"
            DESCRIPTION="${VERIFY_SUMMARY:-Production frontend assets verified}"
          else
            STATE="failure"
            DESCRIPTION="${VERIFY_SUMMARY:-Production frontend asset verification failed}"
          fi
          DESCRIPTION="$(printf '%s' "$DESCRIPTION" | tr -cd '[:alnum:] .,:_()/-' | cut -c1-140)"
          DETAIL="$(printf '%s' "$DESCRIPTION" | base64 | tr -d '\n=' | tr '+/' '-_')"
          TARGET_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}?frontend_result=${DETAIL}"

          PAYLOAD="$(printf '{"state":"%s","context":"production/frontend-assets","description":"%s","target_url":"%s"}' \
            "$STATE" "$DESCRIPTION" "$TARGET_URL")"

          curl -fsS --retry 3 --retry-all-errors \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -d "$PAYLOAD"

      - name: Verify TikTok Events API
        id: verify_tiktok_events_api
        continue-on-error: true
        env:
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          cd /var/www/mercasto

          CHANGED_FILES=""
          if [ -n "${BEFORE_SHA:-}" ] && git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
            CHANGED_FILES="$(git diff --name-only "$BEFORE_SHA" "$CURRENT_SHA")"
          fi

          if ! printf '%s\n' "$CHANGED_FILES" | grep -Eq '^(\.github/workflows/deploy-selfhosted\.yml|backend/app/(Services/TikTokEventsApiService|Http/Middleware/TrackTikTokEvents|Console/Commands/VerifyTikTokEventsApi)\.php|backend/config/services\.php|backend/bootstrap/app\.php|backend/app/Observers/UserMetaRegistrationObserver\.php|backend/app/Http/Controllers/Api/MetaEventController\.php|src/utils/(tiktokPixel|metaCapiBridge)\.js)$'; then
            echo "TikTok Events API integration unchanged; verification event skipped."
            echo "summary=TikTok Events API integration unchanged" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          OUTPUT_FILE="$RUNNER_TEMP/tiktok-events-api-verify.out"
          set +e
          docker exec -e DEPLOY_SHA="$CURRENT_SHA" mercasto_backend_container \
            php artisan tiktok:events:verify --event-id="deploy_verify_${CURRENT_SHA}" \
            >"$OUTPUT_FILE" 2>&1
          EXIT_CODE=$?
          set -e

          cat "$OUTPUT_FILE"
          SUMMARY="$(tail -n 1 "$OUTPUT_FILE" | tr -cd '[:alnum:] .,:_()/-' | cut -c1-125)"
          if [ -z "$SUMMARY" ]; then
            SUMMARY="TikTok Events API verification failed without a message"
          fi
          echo "summary=$SUMMARY" >> "$GITHUB_OUTPUT"
          exit "$EXIT_CODE"

      - name: Publish TikTok Events API deploy status
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERIFY_OUTCOME: ${{ steps.verify_tiktok_events_api.outcome }}
          VERIFY_SUMMARY: ${{ steps.verify_tiktok_events_api.outputs.summary }}
        run: |
          set -euo pipefail

          if [ "$VERIFY_OUTCOME" = "success" ]; then
            STATE="success"
            DESCRIPTION="TikTok Events API accepted production verification"
          else
            STATE="failure"
            DESCRIPTION="${VERIFY_SUMMARY:-TikTok Events API verification failed}"
          fi
          DESCRIPTION="$(printf '%s' "$DESCRIPTION" | tr -cd '[:alnum:] .,:_()/-' | cut -c1-140)"
          DETAIL="$(printf '%s' "$DESCRIPTION" | base64 | tr -d '\n=' | tr '+/' '-_')"
          TARGET_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}?tiktok_result=${DETAIL}"

          PAYLOAD="$(printf '{"state":"%s","context":"production/tiktok-events-api","description":"%s","target_url":"%s"}' \
            "$STATE" "$DESCRIPTION" "$TARGET_URL")"

          curl -fsS --retry 3 --retry-all-errors \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -d "$PAYLOAD"

      - name: Verify deployed Meta Pixel
        id: verify_meta_pixel
        continue-on-error: true
        env:
          DEPLOY_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          cd /var/www/mercasto
          COMPOSE_ENV_FILE="$RUNNER_TEMP/mercasto-backend.env"
          test -s "$COMPOSE_ENV_FILE"

          docker compose --env-file "$COMPOSE_ENV_FILE" exec -T -e DEPLOY_SHA="$DEPLOY_SHA" mercasto-frontend sh -lc '
            grep -R -F "4595315270748335" /usr/share/nginx/html/assets >/dev/null
            grep -R -F "connect.facebook.net/en_US/fbevents.js" /usr/share/nginx/html/assets >/dev/null
            printf '\''{"pixel_id":"4595315270748335","bundle_verified":true,"commit":"%s"}\n'\'' "$DEPLOY_SHA" > /usr/share/nginx/html/meta-pixel-status.json
          '

          STATUS_JSON="$(curl -fsS --max-time 15 "https://mercasto.com/meta-pixel-status.json?sha=${DEPLOY_SHA}")"
          printf '%s\n' "$STATUS_JSON"
          printf '%s' "$STATUS_JSON" | grep -F '"pixel_id":"4595315270748335"' >/dev/null
          printf '%s' "$STATUS_JSON" | grep -F '"bundle_verified":true' >/dev/null
          printf '%s' "$STATUS_JSON" | grep -F "\"commit\":\"${DEPLOY_SHA}\"" >/dev/null

      - name: Publish Meta Pixel deploy status
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERIFY_OUTCOME: ${{ steps.verify_meta_pixel.outcome }}
        run: |
          set -euo pipefail

          if [ "$VERIFY_OUTCOME" = "success" ]; then
            STATE="success"
            DESCRIPTION="Meta Pixel verified in running production frontend"
          else
            STATE="failure"
            DESCRIPTION="Meta Pixel production verification failed"
          fi

          DETAIL="$(printf '%s' "$DESCRIPTION" | base64 | tr -d '\n=' | tr '+/' '-_')"
          TARGET_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}?meta_result=${DETAIL}"
          PAYLOAD="$(printf '{"state":"%s","context":"production/meta-pixel","description":"%s","target_url":"%s"}' \
            "$STATE" "$DESCRIPTION" "$TARGET_URL")"

          curl -fsS --retry 3 --retry-all-errors \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -d "$PAYLOAD"

      - name: Production smoke
        id: production_smoke
        continue-on-error: true
        run: |
          set -euo pipefail
          cd /var/www/mercasto
          COMPOSE_ENV_FILE="$RUNNER_TEMP/mercasto-backend.env"
          test -s "$COMPOSE_ENV_FILE"

          for attempt in 1 2 3; do
            if COMPOSE_ENV_FILE="$COMPOSE_ENV_FILE" SMOKE_HTTP_ATTEMPTS=12 SMOKE_HTTP_RETRY_DELAY=5 bash scripts/production-smoke.sh; then
              exit 0
            fi
            echo "production smoke failed, retrying in 20s ($attempt/3)" >&2
            sleep 20
          done
          COMPOSE_ENV_FILE="$COMPOSE_ENV_FILE" SMOKE_HTTP_ATTEMPTS=12 SMOKE_HTTP_RETRY_DELAY=5 bash scripts/production-smoke.sh

      - name: Require production verifications
        if: always()
        env:
          FRONTEND_OUTCOME: ${{ steps.verify_frontend_bundle.outcome }}
          TIKTOK_OUTCOME: ${{ steps.verify_tiktok_events_api.outcome }}
          META_OUTCOME: ${{ steps.verify_meta_pixel.outcome }}
          SMOKE_OUTCOME: ${{ steps.production_smoke.outcome }}
        run: |
          set -euo pipefail
          failed=0

          check_outcome() {
            label="$1"
            outcome="$2"
            if [ "$outcome" != "success" ]; then
              echo "$label failed with outcome: ${outcome:-missing}" >&2
              failed=1
            fi
          }

          check_outcome "Frontend asset verification" "$FRONTEND_OUTCOME"
          check_outcome "TikTok Events API verification" "$TIKTOK_OUTCOME"
          check_outcome "Meta Pixel verification" "$META_OUTCOME"
          check_outcome "Production smoke" "$SMOKE_OUTCOME"
          exit "$failed"

      - name: Recovery on failure
        if: failure()
        run: |
          cd /var/www/mercasto
          docker exec mercasto_backend_container php artisan up || true
          docker start mercasto_backend_container mercasto_reverb_container mercasto_frontend_container mercasto_worker_container mercasto_scheduler_container || true

      - name: Очистка
        if: always()
        run: |
          rm -f "$RUNNER_TEMP/mercasto-backend.env" "$RUNNER_TEMP/tiktok-events-api-verify.out"
          rm -rf "${FRONTEND_DIST_DIR:-}" "${FRONTEND_LIVE_DIR:-}"
          docker image prune -f
