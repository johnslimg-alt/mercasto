name: Deploy Mercasto

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  deploy:
    runs-on: self-hosted # ← главное изменение
    timeout-minutes: 60

    steps:
      - name: Обновить код
        run: |
          cd /var/www/mercasto
          docker exec mercasto_backend_container php artisan up || true
          # sudo: el checkout de producción pertenece a root; el runner es github-runner
          sudo -n git fetch origin
          sudo -n git reset --hard origin/main
          sudo -n git clean -fd
          sudo -n rm -f backend/bootstrap/cache/*.php

          # backend/.env may be root-only. Copy it through the already-running
          # backend container into a runner-private temporary file without
          # weakening the persistent secret file permissions.
          umask 077
          docker exec mercasto_backend_container cat /var/www/.env > "$RUNNER_TEMP/mercasto-backend.env"

      - name: Миграции
        run: |
          cd /var/www/mercasto
          sudo -n rm -f backend/bootstrap/cache/*.php
          docker exec mercasto_backend_container php artisan migrate --force

      - name: Собрать и поднять
        env:
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          cd /var/www/mercasto
          COMPOSE_ENV_FILE="$RUNNER_TEMP/mercasto-backend.env"
          test -s "$COMPOSE_ENV_FILE"

          CHANGED_FILES=""
          if [ -n "${BEFORE_SHA:-}" ] && git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
            CHANGED_FILES="$(git diff --name-only "$BEFORE_SHA" "$CURRENT_SHA")"
          fi

          add_service() {
            case " $BUILD_SERVICES " in
              *" $1 "*) ;;
              *) BUILD_SERVICES="$BUILD_SERVICES $1" ;;
            esac
          }

          BUILD_SERVICES=""
          UP_SERVICES=""

          if [ -z "$CHANGED_FILES" ]; then
            BUILD_SERVICES="mercasto-frontend mercasto-backend"
            UP_SERVICES="mercasto-frontend mercasto-backend mercasto-worker mercasto-scheduler mercasto-reverb"
          else
            echo "$CHANGED_FILES"
            if printf '%s\n' "$CHANGED_FILES" | grep -Eq '^(Dockerfile|src/|public/|index.html|package\.json|package-lock\.json|vite\.config|tailwind\.config|postcss\.config|default\.conf|\.github/workflows/deploy-selfhosted\.yml$)'; then
              add_service mercasto-frontend
              UP_SERVICES="$UP_SERVICES mercasto-frontend"
            fi
            if printf '%s\n' "$CHANGED_FILES" | grep -Eq '^(backend/Dockerfile|backend/composer\.(json|lock)|backend/package(-lock)?\.json|backend/vite\.config)'; then
              add_service mercasto-backend
              UP_SERVICES="$UP_SERVICES mercasto-backend mercasto-worker mercasto-scheduler mercasto-reverb"
            fi
          fi

          if [ -n "$BUILD_SERVICES" ]; then
            docker compose --env-file "$COMPOSE_ENV_FILE" build --parallel $BUILD_SERVICES
          else
            echo "No Docker rebuild required for changed files."
          fi

          if [ -n "$UP_SERVICES" ]; then
            docker compose --env-file "$COMPOSE_ENV_FILE" up -d --no-build --no-deps $UP_SERVICES
            # Recreating mercasto-backend gives it a new container IP; nginx caches the
            # old fastcgi upstream IP until reloaded, causing 502s (incl. Clip webhooks)
            # until the later "Кэш и очереди" step restarts the frontend. Reload now to
            # close that window immediately.
            case " $UP_SERVICES " in
              *" mercasto-backend "*) docker compose exec -T mercasto-frontend nginx -s reload || true ;;
            esac
          else
            echo "No service restart required for changed files."
          fi

      - name: Кэш и очереди
        run: |
          cd /var/www/mercasto
          COMPOSE_ENV_FILE="$RUNNER_TEMP/mercasto-backend.env"
          test -s "$COMPOSE_ENV_FILE"

          docker exec mercasto_backend_container php artisan optimize:clear
          docker exec mercasto_backend_container php artisan optimize
          docker exec mercasto_backend_container php artisan queue:restart
          docker exec mercasto_backend_container php artisan up
          docker restart mercasto_backend_container mercasto_worker_container mercasto_scheduler_container mercasto_reverb_container || true
          docker start mercasto_reverb_container || true
          docker exec mercasto_backend_container getent hosts mercasto-reverb >/dev/null 2>&1 || {
            docker network disconnect mercasto_default mercasto_reverb_container 2>/dev/null || true
            docker network connect --alias mercasto-reverb --alias mercasto_reverb_container mercasto_default mercasto_reverb_container || true
          }
          docker compose --env-file "$COMPOSE_ENV_FILE" restart mercasto-frontend

          for attempt in $(seq 1 30); do
            if curl -fsS --max-time 5 https://mercasto.com/api/auth/providers >/dev/null; then
              exit 0
            fi
            sleep 3
          done

          curl -fsS --max-time 10 https://mercasto.com/api/auth/providers >/dev/null

      - name: Verify deployed Meta Pixel
        id: verify_meta_pixel
        env:
          DEPLOY_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          cd /var/www/mercasto
          COMPOSE_ENV_FILE="$RUNNER_TEMP/mercasto-backend.env"
          test -s "$COMPOSE_ENV_FILE"

          docker compose --env-file "$COMPOSE_ENV_FILE" exec -T -e DEPLOY_SHA="$DEPLOY_SHA" mercasto-frontend sh -lc '
            grep -R -F "4595315270748335" /usr/share/nginx/html/assets >/dev/null
            grep -R -F "connect.facebook.net/en_US/fbevents.js" /usr/share/nginx/html/assets >/dev/null
            printf '\''{"pixel_id":"4595315270748335","bundle_verified":true,"commit":"%s"}\n'\'' "$DEPLOY_SHA" > /usr/share/nginx/html/meta-pixel-status.json
          '

          STATUS_JSON="$(curl -fsS --max-time 15 "https://mercasto.com/meta-pixel-status.json?sha=${DEPLOY_SHA}")"
          printf '%s\n' "$STATUS_JSON"
          printf '%s' "$STATUS_JSON" | grep -F '"pixel_id":"4595315270748335"' >/dev/null
          printf '%s' "$STATUS_JSON" | grep -F '"bundle_verified":true' >/dev/null
          printf '%s' "$STATUS_JSON" | grep -F "\"commit\":\"${DEPLOY_SHA}\"" >/dev/null

      - name: Publish Meta Pixel deploy status
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERIFY_OUTCOME: ${{ steps.verify_meta_pixel.outcome }}
        run: |
          set -euo pipefail

          if [ "$VERIFY_OUTCOME" = "success" ]; then
            STATE="success"
            DESCRIPTION="Meta Pixel verified in running production frontend"
          else
            STATE="failure"
            DESCRIPTION="Meta Pixel production verification failed"
          fi

          PAYLOAD="$(printf '{"state":"%s","context":"production/meta-pixel","description":"%s","target_url":"https://github.com/%s/actions/runs/%s"}' \
            "$STATE" "$DESCRIPTION" "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID")"

          curl -fsS --retry 3 --retry-all-errors \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -d "$PAYLOAD"

      - name: Production smoke
        run: |
          cd /var/www/mercasto
          for attempt in 1 2 3; do
            if SMOKE_HTTP_ATTEMPTS=12 SMOKE_HTTP_RETRY_DELAY=5 bash scripts/production-smoke.sh; then
              exit 0
            fi
            echo "production smoke failed, retrying in 20s ($attempt/3)" >&2
            sleep 20
          done
          SMOKE_HTTP_ATTEMPTS=12 SMOKE_HTTP_RETRY_DELAY=5 bash scripts/production-smoke.sh

      - name: Recovery on failure
        if: failure()
        run: |
          cd /var/www/mercasto
          docker exec mercasto_backend_container php artisan up || true
          docker start mercasto_backend_container mercasto_reverb_container mercasto_frontend_container mercasto_worker_container mercasto_scheduler_container || true

      - name: Очистка
        if: always()
        run: |
          rm -f "$RUNNER_TEMP/mercasto-backend.env"
          docker image prune -f
