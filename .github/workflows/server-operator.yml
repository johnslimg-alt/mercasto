name: Server Operator

on:
  workflow_dispatch:
    inputs:
      operation:
        description: Server operation to run on the production self-hosted runner
        required: true
        default: status
        type: choice
        options:
          - status
          - verify_quick
          - deploy_main
          - restart_frontend
          - restart_stack
          - security_smoke
          - seo_aeo_smoke
          - runner_health
          - logs_frontend
          - logs_backend
          - cleanup_docker
      confirm:
        description: Type MERCASTO for mutating operations: deploy_main, restart_frontend, restart_stack, cleanup_docker
        required: false
        default: ""
        type: string
      tail_lines:
        description: Log lines for logs_frontend/logs_backend
        required: false
        default: "160"
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: server-operator-production
  cancel-in-progress: false

jobs:
  operator:
    name: Run guarded server operation
    runs-on: [self-hosted, linux]
    timeout-minutes: 30

    steps:
      - name: Run selected operation
        shell: bash
        env:
          OPERATION: ${{ inputs.operation }}
          CONFIRM: ${{ inputs.confirm }}
          TAIL_LINES: ${{ inputs.tail_lines }}
        run: |
          set -euo pipefail

          candidates=(
            "/var/www/mercasto"
            "$HOME/mercasto"
            "/root/mercasto"
            "/opt/mercasto"
            "/srv/mercasto"
            "/work"
          )

          project_dir=""
          for dir in "${candidates[@]}"; do
            if [ -f "$dir/docker-compose.yml" ] && [ -d "$dir/.git" ]; then
              project_dir="$dir"
              break
            fi
          done

          if [ -z "$project_dir" ]; then
            found=$(find /var/www /root /home /opt /srv /work -maxdepth 4 -name docker-compose.yml -print 2>/dev/null | head -1 || true)
            if [ -n "$found" ] && [ -d "$(dirname "$found")/.git" ]; then
              project_dir=$(dirname "$found")
            fi
          fi

          if [ -z "$project_dir" ] || [ ! -d "$project_dir/.git" ]; then
            echo "Mercasto project directory was not found."
            exit 1
          fi

          cd "$project_dir"
          git config --global --add safe.directory "$project_dir" || true
          git fetch origin main --prune
          git reset --hard origin/main
          bash scripts/server-operator.sh "$OPERATION" "$CONFIRM"
