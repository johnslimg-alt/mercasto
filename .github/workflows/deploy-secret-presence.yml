name: Deploy Secret Presence Check

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  DEPLOY_SECRET_REPORT_ISSUES: "104 98 92"

jobs:
  push-noop:
    name: Push compatibility no-op
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - run: echo "Deploy secret presence check is manual-only; push is covered by deploy and production checks."

  check:
    runs-on: ubuntu-latest
    if: github.event_name != 'push'
    timeout-minutes: 3
    steps:
      - name: Verify required deploy secrets exist
        shell: bash
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${SERVER_HOST:-}" ]; then
            echo "SERVER_HOST secret is missing."
            exit 1
          fi

          if [ -z "${SSH_KEY:-}" ]; then
            echo "SSH_KEY secret is missing."
            exit 1
          fi

          if [[ ! "$SERVER_HOST" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "SERVER_HOST should be IPv4 during stabilization."
            exit 1
          fi

          echo "Required deploy secrets are present. Values were not printed."
          echo "SERVER_HOST format: IPv4"

      - name: Report result to linked issues
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RESULT: ${{ job.status }}
        run: |
          set -euo pipefail
          timestamp=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          body=$(cat <<EOF
Agent Report: Deploy Secret Presence Check

Result: ${RESULT}
Run: ${RUN_URL}
Timestamp: ${timestamp}

Checks:
- SERVER_HOST secret exists;
- SSH_KEY secret exists;
- SERVER_HOST format is IPv4 during stabilization.

Failed check: see workflow logs if result is failure. Secret values are not printed.

Safety boundary: secret presence/format check only; no deploy, no SSH connection, no database writes, no payment actions, no secret values printed.
EOF
)
          for issue in ${DEPLOY_SECRET_REPORT_ISSUES}; do
            curl -fsS -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/issues/${issue}/comments" \
              -d "$(jq -n --arg body "$body" '{body: $body}')"
          done
