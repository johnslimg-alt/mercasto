name: Deploy Secret Presence Check

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Secret check
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Push compatibility
        if: github.event_name == 'push'
        run: echo "Skipping secret presence check on push."

      - name: Verify required deploy secrets exist
        if: github.event_name != 'push'
        shell: bash
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "${SERVER_HOST:-}"
          test -n "${SSH_KEY:-}"
          [[ "$SERVER_HOST" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]
          echo "Required deploy secrets are present. Values were not printed."
