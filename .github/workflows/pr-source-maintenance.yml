name: PR Source Maintenance

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
    paths:
      - 'src/App.jsx'
      - '.github/workflows/pr-source-maintenance.yml'

permissions:
  contents: write

jobs:
  remove-synthetic-ratings:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Replace synthetic ratings with real-review-only display
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('src/App.jsx')
          content = path.read_text()
          old = '''const getAdRatingStats = (ad = {}) => {
            const rawRating = Number(ad.rating_average ?? ad.average_rating ?? ad.rating ?? 0);
            const rating = rawRating > 0 ? rawRating : 4 + (((Number(ad.id) || 1) % 10) / 10);
            const rawCount = Number(ad.reviews_count ?? ad.comments_count ?? ad.review_count ?? 0);
            const count = rawCount > 0 ? rawCount : ((Number(ad.id) || 1) % 7) + 1;
            return {
              rating: Math.min(5, Math.max(1, rating)),
              count,
            };
          };

          const AdRatingStars = ({ ad, compact = false }) => {
            const { rating, count } = getAdRatingStats(ad);
            const filled = Math.round(rating);
            return (
              <div className={`flex items-center gap-1 ${compact ? 'text-[11px]' : 'text-[13px]'}`}>
                <div className="flex text-amber-400" role="img" aria-label={`${rating.toFixed(1)} estrellas`}>
                  {[1, 2, 3, 4, 5].map(i => (
                    <Star key={i} className={`${compact ? 'h-3 w-3' : 'h-3.5 w-3.5'} ${i <= filled ? 'fill-amber-400' : 'fill-none'} text-amber-400`} />
                  ))}
                </div>
                <span className="font-bold text-slate-700 dark:text-slate-200">{rating.toFixed(1)}</span>
                <span className="text-slate-500 dark:text-slate-400">({count})</span>
              </div>
            );
          };'''
          new = '''const getAdRatingStats = (ad = {}) => {
            const rawRating = Number(ad.rating_average ?? ad.average_rating ?? ad.rating ?? 0);
            const rawCount = Number(ad.reviews_count ?? ad.comments_count ?? ad.review_count ?? 0);
            const count = Number.isFinite(rawCount) && rawCount > 0 ? Math.floor(rawCount) : 0;
            const rating = count > 0 && Number.isFinite(rawRating) && rawRating > 0
              ? Math.min(5, Math.max(1, rawRating))
              : 0;
            return {
              rating,
              count,
              hasReviews: rating > 0 && count > 0,
            };
          };

          const AdRatingStars = ({ ad, compact = false }) => {
            const { rating, count, hasReviews } = getAdRatingStats(ad);
            if (!hasReviews) return null;

            const filled = Math.round(rating);
            return (
              <div className={`flex items-center gap-1 ${compact ? 'text-[11px]' : 'text-[13px]'}`}>
                <div className="flex text-amber-400" role="img" aria-label={`${rating.toFixed(1)} estrellas`}>
                  {[1, 2, 3, 4, 5].map(i => (
                    <Star key={i} className={`${compact ? 'h-3 w-3' : 'h-3.5 w-3.5'} ${i <= filled ? 'fill-amber-400' : 'fill-none'} text-amber-400`} />
                  ))}
                </div>
                <span className="font-bold text-slate-700 dark:text-slate-200">{rating.toFixed(1)}</span>
                <span className="text-slate-500 dark:text-slate-400">({count})</span>
              </div>
            );
          };'''

          if old not in content:
              if 'hasReviews: rating > 0 && count > 0' in content:
                  raise SystemExit(0)
              raise SystemExit('Expected synthetic rating block was not found')

          path.write_text(content.replace(old, new, 1))
          PY

          if git diff --quiet -- src/App.jsx; then
            echo 'Synthetic ratings already removed.'
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/App.jsx
          git commit -m 'Remove synthetic ad ratings'
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
