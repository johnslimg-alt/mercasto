name: Verify srv1 Ollama

on:
  push:
    branches:
      - ops/diagnose-srv1-containers

permissions:
  contents: read
  issues: write

jobs:
  verify:
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - name: Verify current container state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: "333"
        run: |
          set -euo pipefail
          cd /var/www/mercasto
          REPORT="/tmp/srv1-ollama-final.txt"
          {
            echo "timestamp_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            docker inspect --format 'ollama status={{.State.Status}} running={{.State.Running}} health={{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}} restarts={{.RestartCount}}' mercasto_ollama
            echo "models:"
            docker exec mercasto_ollama ollama list
            echo "running_count=$(docker ps -q | wc -l | tr -d ' ')"
            echo "configured_service_count=$(docker compose --env-file backend/.env -f docker-compose.yml -f docker-compose.override.yml config --services | wc -l | tr -d ' ')"
            echo "unhealthy_count=$(docker ps --filter health=unhealthy -q | wc -l | tr -d ' ')"
          } > "$REPORT" 2>&1

          python3 - "$REPORT" > /tmp/issue-comment.json <<'PY'
          import json, pathlib, sys
          text = pathlib.Path(sys.argv[1]).read_text(errors="replace")
          print(json.dumps({"body": "Final verification:\n```text\n" + text + "\n```"}))
          PY

          curl -fsS \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/issues/${ISSUE_NUMBER}/comments" \
            --data-binary @/tmp/issue-comment.json
