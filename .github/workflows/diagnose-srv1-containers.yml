name: Repair srv1 Ollama

on:
  push:
    branches:
      - ops/diagnose-srv1-containers

permissions:
  contents: read
  issues: write

jobs:
  repair:
    runs-on: self-hosted
    timeout-minutes: 20
    steps:
      - name: Start and verify Ollama fallback
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: "333"
        run: |
          set -euo pipefail
          cd /var/www/mercasto
          REPORT="/tmp/srv1-ollama-repair.txt"

          {
            echo "timestamp_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "Starting Ollama from production Compose..."
            docker compose --env-file backend/.env -f docker-compose.yml -f docker-compose.override.yml up -d ollama

            for attempt in $(seq 1 60); do
              state=$(docker inspect --format '{{.State.Status}}' mercasto_ollama 2>/dev/null || true)
              health=$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' mercasto_ollama 2>/dev/null || true)
              echo "attempt=$attempt state=${state:-missing} health=${health:-unknown}"
              if [ "$state" = "running" ] && { [ "$health" = "healthy" ] || [ "$health" = "none" ]; }; then
                break
              fi
              sleep 3
            done

            test "$(docker inspect --format '{{.State.Running}}' mercasto_ollama)" = "true"

            echo
            echo "== Models before verification =="
            docker exec mercasto_ollama ollama list || true

            if ! docker exec mercasto_ollama ollama list | awk 'NR>1 {print $1}' | grep -Eq '^qwen2\.5:1\.5b($|-)'; then
              echo "Model qwen2.5:1.5b is missing; pulling it..."
              docker exec mercasto_ollama ollama pull qwen2.5:1.5b
            fi

            echo
            echo "== Models after verification =="
            docker exec mercasto_ollama ollama list
            docker exec mercasto_ollama ollama list | awk 'NR>1 {print $1}' | grep -Eq '^qwen2\.5:1\.5b($|-)'

            echo
            echo "== Final container status =="
            docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Image}}'
            echo "running_count=$(docker ps -q | wc -l | tr -d ' ')"
            echo "configured_service_count=$(docker compose --env-file backend/.env -f docker-compose.yml -f docker-compose.override.yml config --services | wc -l | tr -d ' ')"
          } > "$REPORT" 2>&1

          python3 - "$REPORT" > /tmp/issue-comment.json <<'PY'
          import json, pathlib, sys
          text = pathlib.Path(sys.argv[1]).read_text(errors="replace")
          print(json.dumps({"body": "Ollama repair result:\n```text\n" + text[:60000] + "\n```"}))
          PY

          curl -fsS \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/issues/${ISSUE_NUMBER}/comments" \
            --data-binary @/tmp/issue-comment.json
