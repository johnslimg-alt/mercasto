name: Manual Verification Suite

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '43 12 * * *'

permissions:
  contents: read

concurrency:
  group: manual-verification-suite-${{ github.ref }}
  cancel-in-progress: true

jobs:
  push-noop:
    name: Push compatibility no-op
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - run: echo "Manual Verification Suite is schedule/manual; push is covered by Production checks and Public Smoke Check."

  verify:
    name: Lightweight verification
    runs-on: ubuntu-latest
    if: github.event_name != 'push'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Public smoke
        shell: bash
        run: |
          set -euo pipefail
          retry() {
            local attempt
            for attempt in 1 2 3 4 5 6; do
              "$@" && return 0
              echo "retrying smoke command in 8s ($attempt/6): $*" >&2
              sleep 8
            done
            "$@"
          }
          retry curl -fsSIL --max-time 30 https://mercasto.com/
          retry bash -c "curl -fsSL --max-time 30 https://mercasto.com/api/categories | grep -q '\"slug\"'"
          retry bash -c "curl -fsSL --max-time 30 'https://mercasto.com/api/ads?page=1' | grep -Eq '\"data\"|\"id\"|\\['"

      - name: Docker Compose config
        shell: bash
        run: docker compose config >/tmp/mercasto_compose.out
