name: Manual Verification Suite

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '43 12 * * *'

permissions:
  contents: read
  issues: write

concurrency:
  group: manual-verification-suite
  cancel-in-progress: true

env:
  MANUAL_VERIFICATION_REPORT_ISSUES: "98 103 104"

jobs:
  push-noop:
    name: Push compatibility no-op
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - run: echo "Manual Verification Suite is schedule/manual; push is covered by Production checks."

  public-smoke:
    name: Public smoke and protected paths
    runs-on: ubuntu-latest
    if: github.event_name != 'push'
    timeout-minutes: 8
    steps:
      - name: Check public site and API
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSIL --max-time 30 https://mercasto.com/
          curl -fsSIL --max-time 30 https://mercasto.com/up
          curl -fsSL --max-time 30 https://mercasto.com/api/categories | head -c 1000 | grep -q '"slug"'
          curl -fsSL --max-time 30 'https://mercasto.com/api/ads?page=1' | head -c 1000 | grep -Eq '"data"|"id"|\['

      - name: Check protected public paths
        shell: bash
        run: |
          set -euo pipefail
          for path in \
            /.env \
            /.git/config \
            /backend/.env \
            /composer.json \
            /package.json \
            /horizon \
            /vendor/horizon
          do
            status=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 30 "https://mercasto.com${path}")
            echo "${path} -> ${status}"
            case "$status" in
              403|404|410) ;;
              *) echo "unexpected status for ${path}: ${status}" >&2; exit 1 ;;
            esac
          done

  frontend-quality:
    name: Frontend build and copy scan
    runs-on: ubuntu-latest
    if: github.event_name != 'push'
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Recovery guard check
        run: npm run check:recovery
      - name: Public copy scan
        run: bash scripts/public-copy-scan.sh
      - name: Build frontend
        run: npm run build

  compose-config:
    name: Compose config checks
    runs-on: ubuntu-latest
    if: github.event_name != 'push'
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose files
        shell: bash
        run: |
          set -euo pipefail
          docker compose config >/tmp/mercasto_compose_base.out
          docker compose -f docker-compose.yml -f docker-compose.override.yml config >/tmp/mercasto_compose_override.out

  report:
    name: Report verification result
    runs-on: ubuntu-latest
    needs:
      - public-smoke
      - frontend-quality
      - compose-config
    if: always() && github.event_name != 'push'
    timeout-minutes: 3
    steps:
      - name: Report result to linked issues
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PUBLIC_SMOKE_RESULT: ${{ needs.public-smoke.result }}
          FRONTEND_QUALITY_RESULT: ${{ needs.frontend-quality.result }}
          COMPOSE_CONFIG_RESULT: ${{ needs.compose-config.result }}
        run: |
          set -euo pipefail
          timestamp=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          overall="success"
          for result in "$PUBLIC_SMOKE_RESULT" "$FRONTEND_QUALITY_RESULT" "$COMPOSE_CONFIG_RESULT"; do
            if [ "$result" != "success" ]; then
              overall="failure"
            fi
          done
          body=$(cat <<EOF
Agent Report: Manual Verification Suite

Result: ${overall}
Run: ${RUN_URL}
Timestamp: ${timestamp}

Checks:
- public smoke and protected public paths: ${PUBLIC_SMOKE_RESULT};
- frontend build and public copy scan: ${FRONTEND_QUALITY_RESULT};
- compose config checks: ${COMPOSE_CONFIG_RESULT}.

Safety boundary: verification only; no server shell, no deploy, no database writes, no payment actions, no secret values printed.
EOF
)
          for issue in ${MANUAL_VERIFICATION_REPORT_ISSUES}; do
            curl -fsS -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/issues/${issue}/comments" \
              -d "$(jq -n --arg body "$body" '{body: $body}')"
          done
