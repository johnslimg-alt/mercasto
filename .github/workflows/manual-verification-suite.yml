name: Manual Verification Suite

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '43 12 * * *'

permissions:
  contents: read

concurrency:
  group: manual-verification-suite-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lightweight verification
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Public smoke
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSIL --max-time 30 https://mercasto.com/
          curl -fsSL --max-time 30 https://mercasto.com/api/categories | head -c 1000 | grep -q '"slug"'
          curl -fsSL --max-time 30 'https://mercasto.com/api/ads?page=1' | head -c 1000 | grep -Eq '"data"|"id"|\['

      - name: Docker Compose config
        shell: bash
        run: docker compose config >/tmp/mercasto_compose.out
