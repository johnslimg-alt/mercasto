name: Public Smoke Check

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '17 11 * * *'

permissions:
  contents: read

concurrency:
  group: public-smoke-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Public site and API smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check public endpoints
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSIL --max-time 30 https://mercasto.com/
          curl -fsSL --max-time 30 https://mercasto.com/ | grep -i "Mercasto"
          curl -fsSL --max-time 30 https://mercasto.com/api/auth/providers | grep -Eq 'google|\{'
          curl -fsSL --max-time 30 https://mercasto.com/api/categories | head -c 1000 | grep -q '"slug"'
          curl -fsSL --max-time 30 'https://mercasto.com/api/ads?page=1' | head -c 1000 | grep -Eq '"data"|"id"|\['

      - name: Check protected public paths
        shell: bash
        run: |
          set -euo pipefail
          for path in /.env /.git/config /backend/.env /composer.json /package.json /horizon /vendor/horizon; do
            status=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 30 "https://mercasto.com${path}")
            echo "${path} -> ${status}"
            case "$status" in
              403|404|410) ;;
              *) echo "unexpected status for ${path}: ${status}" >&2; exit 1 ;;
            esac
          done
