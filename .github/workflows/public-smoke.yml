name: Public Smoke Check

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '17 11 * * *'

permissions:
  contents: read

concurrency:
  group: public-smoke-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Public site and API smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check public endpoints
        shell: bash
        run: |
          set -euo pipefail
          retry() {
            local attempt
            for attempt in 1 2 3 4 5; do
              if "$@"; then
                return 0
              fi
              echo "attempt ${attempt} failed: $*" >&2
              sleep 8
            done
            return 1
          }

          retry curl -fsSIL --max-time 30 https://mercasto.com/
          retry bash -c "curl -fsSL --max-time 30 https://mercasto.com/ | grep -i Mercasto"
          retry bash -c "curl -fsSL --max-time 30 https://mercasto.com/api/auth/providers | grep -Eq 'google|\\{'"
          retry bash -c "curl -fsSL --max-time 30 https://mercasto.com/api/categories | grep -q '\"slug\"'"
          retry bash -c "curl -fsSL --max-time 30 'https://mercasto.com/api/ads?page=1' | grep -Eq '\"data\"|\"id\"|\\['"

      - name: Check protected public paths
        shell: bash
        run: |
          set -euo pipefail
          for path in /.env /.git/config /backend/.env /composer.json /package.json /horizon /vendor/horizon; do
            status=$(curl -sS --retry 4 --retry-delay 8 --retry-connrefused -o /dev/null -w '%{http_code}' --max-time 30 "https://mercasto.com${path}")
            echo "${path} -> ${status}"
            case "$status" in
              403|404|410) ;;
              *) echo "unexpected status for ${path}: ${status}" >&2; exit 1 ;;
            esac
          done
