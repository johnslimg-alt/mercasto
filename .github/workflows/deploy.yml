name: Deploy to Production

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Execute deployment via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: "72.62.173.145"
          username: "root"
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            
            echo "🚀 Mercasto Deploy — $(date)"
            cd /opt/mercasto
            
            # 1. Git pull
            echo "📥 Pulling code..."
            git fetch origin
            git reset --hard origin/main
            
            # 2. Env fixes for PostgreSQL 18
            echo "⚙️ Configuring environment..."
            if [ -f backend/.env ]; then
              sed -i "s/DB_CONNECTION=.*/DB_CONNECTION=pgsql/" backend/.env
              sed -i "s/DB_HOST=.*/DB_HOST=postgres/" backend/.env
              sed -i "s/DB_PORT=.*/DB_PORT=5432/" backend/.env
              sed -i "s/CACHE_DRIVER=.*/CACHE_DRIVER=redis/" backend/.env
              sed -i "s/QUEUE_CONNECTION=.*/QUEUE_CONNECTION=redis/" backend/.env
              
              # Add Ollama config if missing
              grep -q "OLLAMA_HOST" backend/.env || echo "OLLAMA_HOST=http://ollama:11434" >> backend/.env
              grep -q "OLLAMA_TEXT_MODEL" backend/.env || echo "OLLAMA_TEXT_MODEL=mistral-small3.1:24b-instruct-2503-q4_K_M" >> backend/.env
            fi
            
            # 3. Docker build (parallel, cache)
            echo "🐳 Building images..."
            docker compose build --parallel frontend backend
            
            # 4. Zero-downtime restart
            echo "🔄 Restarting services..."
            docker compose up -d --no-deps --build frontend backend worker scheduler
            
            # 5. Wait for DB
            echo "⏳ Waiting for PostgreSQL..."
            sleep 8
            
            # 6. Laravel tasks
            echo "🔧 Laravel optimization..."
            docker exec mercasto_backend composer install --no-dev --optimize-autoloader --no-interaction
            docker exec mercasto_backend php artisan migrate --force
            docker exec mercasto_backend php artisan config:cache
            docker exec mercasto_backend php artisan route:cache
            docker exec mercasto_backend php artisan view:cache
            docker exec mercasto_backend php artisan event:cache
            docker exec mercasto_backend php artisan storage:link || true
            
            # 7. Frontend build check
            echo "🎨 Verifying frontend..."
            docker exec mercasto_frontend ls -la /app/dist/index.html || echo "Frontend build missing!"
            
            # 8. Health checks
            echo "🏥 Health checks..."
            sleep 3
            curl -sf https://mercasto.com/api/health || echo "⚠️ API health check failed"
            curl -sf -I https://mercasto.com | head -1
            
            # 9. Check AI services
            echo "🤖 AI Services..."
            docker exec mercasto_ollama ollama list | grep mistral || echo "Mistral not loaded"
            docker exec mercasto_backend php artisan tinker --execute="echo 'OPcache JIT: ' . opcache_get_status()['jit']['enabled'];" || true
            
            # 10. Cleanup (safe)
            echo "🧹 Cleanup..."
            docker image prune -f --filter "until=24h"
            
            # 11. Status
            echo "✅ Deployment complete"
            docker compose ps --format "table {{.Name}}\t{{.Status}}\t{{.Ports}}"
