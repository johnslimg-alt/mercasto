name: Deploy to Production
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: "72.62.173.145"
          username: "root"
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /var/www/mercasto
            git fetch origin && git reset --hard origin/main
            docker compose build --parallel mercasto-frontend mercasto-backend
            docker compose up -d --no-deps mercasto-frontend mercasto-backend mercasto-worker mercasto-scheduler mercasto-reverb
            sleep 5
            docker exec mercasto_backend_container php artisan migrate --force
            docker exec mercasto_backend_container php artisan optimize:clear
            docker exec mercasto_backend_container php artisan optimize
            docker image prune -f
