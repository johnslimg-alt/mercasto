name: Deploy Mercasto Frontend Hotfix

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-frontend-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 20

    steps:
      - name: Find project directory
        run: |
          set -euo pipefail

          candidates=(
            "$HOME/mercasto"
            "/root/mercasto"
            "/var/www/mercasto"
            "/opt/mercasto"
            "/srv/mercasto"
          )

          project_dir=""
          for dir in "${candidates[@]}"; do
            if [ -f "$dir/docker-compose.yml" ] && [ -d "$dir/.git" ]; then
              project_dir="$dir"
              break
            fi
          done

          if [ -z "$project_dir" ]; then
            found=$(find /root /home /var/www /opt /srv "$HOME" -maxdepth 4 -name docker-compose.yml -print 2>/dev/null | head -1 || true)
            if [ -n "$found" ]; then
              project_dir=$(dirname "$found")
            fi
          fi

          if [ -z "$project_dir" ] || [ ! -d "$project_dir/.git" ]; then
            echo "Mercasto project directory was not found."
            exit 1
          fi

          echo "PROJECT_DIR=$project_dir" >> "$GITHUB_ENV"
          echo "Using project directory: $project_dir"

      - name: Pull latest main
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"
          git config --global --add safe.directory "$PROJECT_DIR" || true
          git fetch origin main --prune
          git reset --hard origin/main
          git clean -fd

      - name: Build frontend
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"
          DOCKER_BUILDKIT=1 docker compose build --no-cache mercasto-frontend

      - name: Restart frontend
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"
          docker compose up -d --no-deps mercasto-frontend
          docker compose ps

      - name: Smoke check
        run: |
          set -euo pipefail
          curl -I --max-time 30 https://mercasto.com/
          curl -sS --max-time 30 https://mercasto.com/api/categories | head -c 300
