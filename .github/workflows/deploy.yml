name: Deploy to Production

on:
  push:
    branches:
      - main # Воркфлоу запустится при пуше в эту ветку

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Execute deployment script via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: "72.62.173.145"
          username: "root"
          key: ${{ secrets.SERVER_SSH_KEY }}
          # Скрипт, который будет выполнен прямо на вашем сервере
          script: |
            # Переходим в папку с проектом
            cd /var/www/mercasto
            
            # --- ЭКСТРЕННАЯ ОЧИСТКА СЕРВЕРА (АУДИТ БЕЗОПАСНОСТИ) ---
            pm2 stop laravel-api || true
            pm2 delete laravel-api || true
            pm2 save || true
            rm -f /var/www/mercasto/y /var/www/mercasto/y.pub /var/www/mercasto/*.py /var/www/mercasto/*.exp /var/www/mercasto/*.sh /var/www/mercasto/mercasto-report.txt
            rm -f /var/www/mercasto/src/BackupDatabase.php /var/www/mercasto/src/LoginFrontendTest.php /var/www/mercasto/src/UploadAdImage.php /var/www/mercasto/src/GeminiDemo.jsx /var/www/mercasto/src/AdminPanelJSX.txt
            
            # Очистка диска от мусора Docker
            docker image prune -a -f || true
            # -------------------------------------------------------
            
            # 1. Получаем свежий код из репозитория
            git fetch origin
            git reset --hard origin/main
            
            # Auto-configure webhook secret if missing
            if ! grep -q "CLIP_WEBHOOK_SECRET=" backend/.env 2>/dev/null; then
              echo "CLIP_WEBHOOK_SECRET=$(openssl rand -hex 32)" >> backend/.env
            elif grep -q "CLIP_WEBHOOK_SECRET=$" backend/.env 2>/dev/null; then
              sed -i "s/CLIP_WEBHOOK_SECRET=.*/CLIP_WEBHOOK_SECRET=$(openssl rand -hex 32)/" backend/.env
            fi
            
            # Автоматически переключаем Laravel на использование PostgreSQL
            sed -i "s/DB_CONNECTION=.*/DB_CONNECTION=pgsql/" backend/.env 2>/dev/null || true
            sed -i "s/DB_PORT=.*/DB_PORT=5432/" backend/.env 2>/dev/null || true
            
            # FIX: Восстановление убитой базы данных PostgreSQL
            if [ -d "postgres-data" ] && [ ! -f "postgres-data/PG_VERSION" ]; then
              echo "Обнаружена поврежденная БД PostgreSQL. Выполняется жесткий сброс..."
              docker compose down || true
              sudo rm -rf postgres-data redis-data mysql-data
            fi
            
            # 2. ЗАПУСК И ПЕРЕСБОРКА DOCKER (БД должна работать до миграций)
            docker compose --profile realtime up -d --build --remove-orphans
            
            # 3. Собираем бэкенд (Laravel)
            docker exec mercasto_backend_container composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
            docker exec mercasto_backend_container composer dump-autoload
            docker exec mercasto_backend_container php artisan config:clear
            docker exec mercasto_backend_container php artisan migrate --force
            docker exec mercasto_backend_container php artisan config:cache
            docker exec mercasto_backend_container php artisan route:cache
            docker exec mercasto_backend_container php artisan view:cache
            docker exec mercasto_backend_container php artisan storage:link || true
            
            # Restart backend container to clear OPcache
            docker restart mercasto_backend_container || true
            sudo systemctl restart php8.3-fpm || true
            sudo systemctl restart php-fpm || true