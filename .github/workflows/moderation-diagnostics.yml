name: Moderation Diagnostics

on:
  pull_request:
    paths:
      - 'backend/app/**'
      - 'backend/database/**'
      - 'backend/tests/Feature/*Moderation*.php'
      - '.github/workflows/moderation-diagnostics.yml'

jobs:
  moderation-tests:
    runs-on: ubuntu-24.04
    env:
      APP_ENV: testing
      APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      DB_CONNECTION: sqlite
      DB_DATABASE: ':memory:'
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array
      LOG_CHANNEL: stderr
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_sqlite
          coverage: none
      - name: Install Composer dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist --no-progress
      - name: Run moderation tests with full output
        id: moderation
        working-directory: backend
        shell: bash
        run: |
          set +e
          : > moderation-phpunit.log
          status=0
          for test in \
            tests/Feature/ModerationStatusSchemaDiagnosticTest.php \
            tests/Feature/AdminAdModerationRoutesTest.php \
            tests/Feature/AdminAdModerationDecisionTest.php \
            tests/Feature/AdIllustrativeCoverServiceTest.php \
            tests/Feature/ModerationPlaceholderReplacementTest.php \
            tests/Feature/ModerationQueueCommandTest.php \
            tests/Feature/ModerateAdWithAITest.php
          do
            echo "===== $test =====" | tee -a moderation-phpunit.log
            vendor/bin/phpunit "$test" --testdox 2>&1 | tee -a moderation-phpunit.log
            code=${PIPESTATUS[0]}
            if [ "$code" -ne 0 ]; then status=$code; fi
          done
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload diagnostic log
        uses: actions/upload-artifact@v4
        with:
          name: moderation-phpunit-log
          path: backend/moderation-phpunit.log
          if-no-files-found: error
      - name: Fail when a moderation test failed
        if: steps.moderation.outputs.exit_code != '0'
        run: exit 1
