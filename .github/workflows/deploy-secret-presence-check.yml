name: Deploy Secret Presence Check

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Verify required deploy secrets exist
        shell: bash
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${SERVER_HOST:-}" ]; then
            echo "SERVER_HOST secret is missing."
            exit 1
          fi

          if [ -z "${SSH_KEY:-}" ]; then
            echo "SSH_KEY secret is missing."
            exit 1
          fi

          if [[ ! "$SERVER_HOST" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "SERVER_HOST should be IPv4 during stabilization."
            exit 1
          fi

          echo "Required deploy secrets are present. Values were not printed."
          echo "SERVER_HOST format: IPv4"
