name: Catalog Integrity Maintenance

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - 'src/App.jsx'
      - 'src/components/screens/AdDetailScreen.jsx'
      - 'backend/app/Http/Controllers/Api/AdController.php'
      - 'scripts/check-recovery-guards.mjs'
      - 'scripts/patch_catalog_*.py'
      - '.github/workflows/pr-catalog-integrity-maintenance.yml'

concurrency:
  group: catalog-integrity-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  patch-and-verify:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply catalog integrity changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set +e
          {
            python3 scripts/patch_catalog_cards.py
            python3 scripts/patch_catalog_detail.py
            python3 scripts/patch_catalog_seller.py
            python3 scripts/patch_catalog_guards.py
          } > /tmp/catalog-integrity.log 2>&1
          code=$?
          set -e
          cat /tmp/catalog-integrity.log

          if [ "$code" -ne 0 ]; then
            {
              echo '### Catalog integrity patch diagnostics'
              echo
              echo '```text'
              tail -100 /tmp/catalog-integrity.log
              echo '```'
            } > /tmp/catalog-comment.md

            python3 - <<'PY' > /tmp/catalog-comment.json
          import json
          from pathlib import Path
          print(json.dumps({'body': Path('/tmp/catalog-comment.md').read_text()}))
          PY

            curl -fsS --retry 3 --retry-all-errors \
              -X POST \
              -H 'Accept: application/vnd.github+json' \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
              --data-binary @/tmp/catalog-comment.json
            exit "$code"
          fi

      - name: Verify catalog integrity changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set +e
          {
            npm ci --no-audit --no-fund
            npm run check:recovery
            npm run lint:ci
            npm run build
            php -l backend/app/Http/Controllers/Api/AdController.php
          } > /tmp/catalog-verify.log 2>&1
          code=$?
          set -e
          cat /tmp/catalog-verify.log

          if [ "$code" -ne 0 ]; then
            {
              echo '### Catalog integrity verification diagnostics'
              echo
              echo '```text'
              tail -120 /tmp/catalog-verify.log
              echo '```'
            } > /tmp/catalog-comment.md

            python3 - <<'PY' > /tmp/catalog-comment.json
          import json
          from pathlib import Path
          print(json.dumps({'body': Path('/tmp/catalog-comment.md').read_text()}))
          PY

            curl -fsS --retry 3 --retry-all-errors \
              -X POST \
              -H 'Accept: application/vnd.github+json' \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
              --data-binary @/tmp/catalog-comment.json
            exit "$code"
          fi

      - name: Commit application changes and remove temporary tooling
        run: |
          rm -f \
            .github/workflows/pr-catalog-integrity-maintenance.yml \
            scripts/patch_catalog_cards.py \
            scripts/patch_catalog_detail.py \
            scripts/patch_catalog_seller.py \
            scripts/patch_catalog_guards.py

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A

          if git diff --cached --quiet; then
            echo 'Catalog integrity changes already applied.'
            exit 0
          fi

          git commit -m 'Present catalog references honestly and prioritize real ads'
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
