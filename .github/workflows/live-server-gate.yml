name: Manual server gate

on:
  workflow_dispatch:
    inputs:
      operation:
        description: 'Gate to run'
        required: true
        default: 'status'
        type: choice
        options:
          - status
          - verify_quick
          - security_smoke
          - seo_aeo_smoke
  workflow_run:
    workflows:
      - Production checks
    types:
      - completed

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: manual-server-gate
  cancel-in-progress: false

jobs:
  server-gate:
    name: Manual server gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          (github.event.workflow_run.conclusion == 'success' &&
           github.event.workflow_run.event == 'pull_request' &&
           github.event.workflow_run.head_repository.full_name == github.repository) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate SSH inputs
        env:
          SSH_HOST: ${{ secrets.MERCASTO_SSH_HOST }}
          SSH_USER: ${{ secrets.MERCASTO_SSH_USER }}
          SSH_KEY: ${{ secrets.MERCASTO_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          test -n "${SSH_HOST}" || { echo "Missing MERCASTO_SSH_HOST" >&2; exit 64; }
          test -n "${SSH_USER}" || { echo "Missing MERCASTO_SSH_USER" >&2; exit 64; }
          test -n "${SSH_KEY}" || { echo "Missing MERCASTO_SSH_PRIVATE_KEY" >&2; exit 64; }

      - name: Scan server host key
        env:
          SSH_HOST: ${{ secrets.MERCASTO_SSH_HOST }}
          SSH_PORT: ${{ secrets.MERCASTO_SSH_PORT }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          touch ~/.ssh/known_hosts && chmod 600 ~/.ssh/known_hosts
          ssh-keyscan -p "${SSH_PORT:-22}" -T 10 "${SSH_HOST}" >> ~/.ssh/known_hosts
          echo "Host key scanned successfully."

      - name: Run gate
        env:
          SSH_HOST: ${{ secrets.MERCASTO_SSH_HOST }}
          SSH_PORT: ${{ secrets.MERCASTO_SSH_PORT }}
          SSH_USER: ${{ secrets.MERCASTO_SSH_USER }}
          SSH_KEY: ${{ secrets.MERCASTO_SSH_PRIVATE_KEY }}
          OPERATION: ${{ github.event.inputs.operation || 'verify_quick' }}
        run: bash scripts/live-server-gate.sh "${OPERATION}"