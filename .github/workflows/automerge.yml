name: Automerge labeled PRs

on:
  pull_request:
    types:
      - labeled
      - unlabeled
      - synchronize
      - opened
      - edited
      - ready_for_review
      - reopened
      - unlocked
  pull_request_review:
    types:
      - submitted
  check_suite:
    types:
      - completed
  status: {}
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read

concurrency:
  group: automerge-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  automerge:
    name: Merge PRs labeled automerge
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft == false
    steps:
      - name: Automerge when ready
        id: automerge
        uses: pascalgn/automerge-action@v0.16.4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_LABELS: automerge,!wip,!blocked,!do-not-merge
          MERGE_METHOD: squash
          MERGE_DELETE_BRANCH: true
          MERGE_RETRIES: '30'
          MERGE_RETRY_SLEEP: '20000'
          UPDATE_LABELS: automerge
          UPDATE_METHOD: merge
