name: Automerge labeled PRs

on:
  pull_request:
    types:
      - labeled
      - synchronize
      - ready_for_review
      - reopened
  workflow_run:
    workflows:
      - PR Quality Gate
      - Production checks
      - Frontend Quality Gate
    types:
      - completed
  workflow_dispatch:
    inputs:
      pr:
        description: Pull request number to merge when ready
        required: false
        type: string
      confirm:
        description: Type MERCASTO to enable manual automerge
        required: false
        default: ""
        type: string

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read
  actions: write

env:
  GH_REPO: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: automerge-${{ github.event.pull_request.number || github.event.workflow_run.head_branch || github.run_id }}
  cancel-in-progress: false

jobs:
  automerge:
    name: Merge PRs labeled automerge
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR number
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_PR: ${{ github.event.pull_request.number }}
          EVENT_BRANCH: ${{ github.event.workflow_run.head_branch }}
          INPUT_PR: ${{ inputs.pr }}
          INPUT_CONFIRM: ${{ inputs.confirm }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "${INPUT_CONFIRM:-}" != "MERCASTO" ]; then
            echo "Manual automerge requires confirm=MERCASTO."
            exit 64
          fi

          pr="${INPUT_PR:-}"
          if [ -z "$pr" ] && [ -n "${EVENT_PR:-}" ]; then
            pr="$EVENT_PR"
          fi
          if [ -z "$pr" ] && [ -n "${EVENT_BRANCH:-}" ]; then
            pr="$(gh pr list --repo "$GH_REPO" --head "$EVENT_BRANCH" --state open --json number --jq '.[0].number // empty')"
          fi

          if [ -z "$pr" ]; then
            echo "No PR resolved; exiting."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          case "$pr" in
            ''|*[!0-9]*)
              echo "Invalid PR number: $pr"
              exit 2
              ;;
          esac

          echo "pr=$pr" >> "$GITHUB_OUTPUT"
          echo "should_run=true" >> "$GITHUB_OUTPUT"

      - name: Validate automerge eligibility
        id: eligible
        if: steps.resolve.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.resolve.outputs.pr }}
        run: |
          set -euo pipefail

          data="$(gh pr view "$PR_NUMBER" --repo "$GH_REPO" --json isDraft,labels,mergeStateStatus,state,headRefName,headRefOid,authorAssociation)"

          state="$(printf '%s' "$data" | jq -r '.state')"
          draft="$(printf '%s' "$data" | jq -r '.isDraft')"
          merge_state="$(printf '%s' "$data" | jq -r '.mergeStateStatus')"
          labels="$(printf '%s' "$data" | jq -r '[.labels[].name] | join(",")')"
          head_sha="$(printf '%s' "$data" | jq -r '.headRefOid')"
          author_association="$(printf '%s' "$data" | jq -r '.authorAssociation')"

          echo "state=$state labels=$labels merge_state=$merge_state author_association=$author_association head=$head_sha"
          echo "head_sha=$head_sha" >> "$GITHUB_OUTPUT"

          case "$author_association" in
            OWNER|MEMBER|COLLABORATOR)
              ;;
            *)
              echo "Refusing untrusted author association: $author_association"
              echo "eligible=false" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac

          if [ "$state" != "OPEN" ]; then
            echo "PR is not open; exiting."
            echo "eligible=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$draft" = "true" ]; then
            echo "PR is draft; exiting."
            echo "eligible=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! printf '%s' "$labels" | tr ',' '\n' | grep -Fxq 'automerge'; then
            echo "Missing automerge label; exiting."
            echo "eligible=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          for blocked in wip blocked do-not-merge security-hold production-hold; do
            if printf '%s' "$labels" | tr ',' '\n' | grep -Fxq "$blocked"; then
              echo "Blocking label present: $blocked"
              echo "eligible=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          case "$merge_state" in
            CLEAN|HAS_HOOKS|UNSTABLE)
              echo "eligible=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "PR is not merge-ready yet: $merge_state"
              echo "eligible=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Squash merge eligible PR
        if: steps.eligible.outputs.eligible == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.resolve.outputs.pr }}
          HEAD_SHA: ${{ steps.eligible.outputs.head_sha }}
        run: |
          set -euo pipefail
          gh pr merge "$PR_NUMBER" \
            --repo "$GH_REPO" \
            --squash \
            --delete-branch \
            --match-head-commit "$HEAD_SHA"

      - name: Dispatch post-merge production checks
        if: steps.eligible.outputs.eligible == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh workflow run production-checks.yml --repo "$GH_REPO" --ref main
