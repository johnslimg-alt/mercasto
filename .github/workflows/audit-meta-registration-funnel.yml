name: Audit Meta Registration Funnel

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/audit-meta-registration-funnel.yml'

permissions:
  contents: read

jobs:
  audit:
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Locate exact funnel handlers
        run: |
          set -euo pipefail
          echo '=== MATCHING FILES ==='
          grep -RIlE "sign_up|CompleteRegistration|just_registered|auth/register|meta_event_id" src backend/app backend/routes backend/tests backend/config | sort
          echo '=== APP REGISTRATION HANDLERS ==='
          grep -nE -B18 -A40 "sign_up|just_registered|/register|auth/register|registerData|handleRegister|registration" src/App.jsx | head -420 || true
          echo '=== BACKEND COMPLETE REGISTRATION ==='
          grep -RInE -B18 -A45 "CompleteRegistration|complete.?registration|event_id|fbc|fbp" backend/app backend/routes backend/tests backend/config | head -520 || true
          echo '=== META BRIDGE REGISTRATION ==='
          grep -nE -B12 -A30 "sign_up|CompleteRegistration|event_id" src/utils/metaCapiBridge.js | head -220 || true
          echo '=== PROTECTED RETURN ==='
          grep -nE -B12 -A35 "writeIntent|restoreIntentWhenReady|seller_post_returned_after_auth|just_registered" src/utils/protectedRouteReturn.js | head -300 || true

      - name: Audit production registration counts and Meta configuration
        run: |
          set -euo pipefail
          cd /var/www/mercasto
          sudo -n git fetch origin main --quiet
          test "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)"

          docker exec -i mercasto_backend_container php <<'PHP'
          <?php

          use Illuminate\Support\Facades\DB;

          require '/var/www/vendor/autoload.php';
          $app = require '/var/www/bootstrap/app.php';
          $app->make(Illuminate\Contracts\Console\Kernel::class)->bootstrap();

          $now = now();
          $windows = [1, 3, 7, 14, 30];
          $registrations = [];
          foreach ($windows as $days) {
              $registrations[$days . '_days'] = DB::table('users')
                  ->where('created_at', '>=', $now->copy()->subDays($days))
                  ->count();
          }

          $daily = DB::table('users')
              ->where('created_at', '>=', $now->copy()->subDays(30))
              ->selectRaw("DATE(created_at) AS day, COUNT(*) AS registrations")
              ->groupByRaw('DATE(created_at)')
              ->orderBy('day')
              ->get();

          $tables = collect(DB::select("select tablename from pg_tables where schemaname = 'public'"))
              ->pluck('tablename')
              ->filter(fn ($name) => str_contains(strtolower($name), 'meta') || str_contains(strtolower($name), 'event') || str_contains(strtolower($name), 'analytic'))
              ->values();

          echo json_encode([
              'generated_at' => $now->toIso8601String(),
              'registrations' => $registrations,
              'daily_registrations' => $daily,
              'candidate_event_tables' => $tables,
              'meta_config' => [
                  'pixel_id_present' => filled(config('services.meta.pixel_id')) || filled(env('META_PIXEL_ID')),
                  'access_token_present' => filled(config('services.meta.access_token')) || filled(env('META_ACCESS_TOKEN')),
                  'test_event_code_present' => filled(config('services.meta.test_event_code')) || filled(env('META_TEST_EVENT_CODE')),
              ],
          ], JSON_PRETTY_PRINT | JSON_UNESCAPED_UNICODE | JSON_UNESCAPED_SLASHES), PHP_EOL;
          PHP
