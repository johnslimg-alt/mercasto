name: Audit Meta Registration Funnel

on:
  push:
    branches:
      - fix/meta-registration-funnel
    paths:
      - '.github/workflows/audit-meta-registration-funnel.yml'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/audit-meta-registration-funnel.yml'

permissions:
  contents: write

jobs:
  audit-and-fix:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/meta-registration-funnel
          fetch-depth: 0

      - name: Apply shared CompleteRegistration event id
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          app = Path('src/App.jsx')
          text = app.read_text()
          import_anchor = "import { trackPageView, events } from './utils/analytics';\n"
          import_line = "import { createRegistrationMetaEventId } from './utils/registrationMetaEvent';\n"
          if import_line not in text:
              if import_anchor not in text:
                  raise SystemExit('Analytics import anchor not found')
              text = text.replace(import_anchor, import_anchor + import_line, 1)

          old_setup = """    const formData = new FormData(e.target);
    const data = Object.fromEntries(formData.entries());

    try {
      let endpoint = '';
      if (authMode === 'register') {
        endpoint = '/register';
        const pendingReferral = localStorage.getItem('pendingReferral');
        if (pendingReferral) data.referral_code = pendingReferral;
      }
"""
          new_setup = """    const formData = new FormData(e.target);
    const data = Object.fromEntries(formData.entries());
    const registrationMetaEventId = authMode === 'register'
      ? createRegistrationMetaEventId()
      : '';

    try {
      let endpoint = '';
      if (authMode === 'register') {
        endpoint = '/register';
        data.meta_event_id = registrationMetaEventId;
        const pendingReferral = localStorage.getItem('pendingReferral');
        if (pendingReferral) data.referral_code = pendingReferral;
      }
"""
          if new_setup not in text:
              if old_setup not in text:
                  raise SystemExit('Registration setup block not found')
              text = text.replace(old_setup, new_setup, 1)

          old_track = """          if (authMode === 'register') {
            localStorage.setItem('just_registered', '1');
            events.registered();
          }
"""
          new_track = """          if (authMode === 'register') {
            localStorage.setItem('just_registered', '1');
            events.registered({
              event_id: registrationMetaEventId,
              meta_event_id: registrationMetaEventId,
            });
          }
"""
          if new_track not in text:
              if old_track not in text:
                  raise SystemExit('Registration analytics block not found')
              text = text.replace(old_track, new_track, 1)
          app.write_text(text)

          guards = Path('scripts/check-recovery-guards.mjs')
          guard_text = guards.read_text()
          marker = """assertContains(
  'src/utils/protectedRouteReturn.js',
  \"trackSellerFunnel('seller_post_intent_abandoned'\",
  'seller intent drop-off is measurable for marketing optimization'
);
"""
          additions = marker + """

assertContains(
  'src/App.jsx',
  'data.meta_event_id = registrationMetaEventId;',
  'registration sends the shared Meta event id to Laravel before user creation'
);

assertContains(
  'src/App.jsx',
  'event_id: registrationMetaEventId,',
  'browser CompleteRegistration reuses the server event id for Meta deduplication'
);

assertContains(
  'src/utils/registrationMetaEvent.js',
  \"const REGISTRATION_EVENT_PREFIX = 'register_user_';\",
  'registration event ids remain valid for the Laravel observer allowlist'
);

assertOrder(
  'src/App.jsx',
  'data.meta_event_id = registrationMetaEventId;',
  'body: JSON.stringify(data)',
  'the Meta registration event id is attached before the registration request is sent'
);

assertOrder(
  'src/App.jsx',
  \"localStorage.setItem('auth_token', result.access_token);\",
  'events.registered({',
  'CompleteRegistration is emitted only after authentication succeeds'
);
"""
          if "data.meta_event_id = registrationMetaEventId;" not in guard_text:
              if marker not in guard_text:
                  raise SystemExit('Recovery guard insertion marker not found')
              guard_text = guard_text.replace(marker, additions, 1)
          guards.write_text(guard_text)
          PY

          npm run check:recovery
          npm run lint:ci
          npm run build

      - name: Commit application fix
        run: |
          set -euo pipefail
          if git diff --quiet -- src/App.jsx scripts/check-recovery-guards.mjs; then
            echo 'Application fix already present.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/App.jsx src/utils/registrationMetaEvent.js scripts/check-recovery-guards.mjs
          git commit -m 'Fix Meta CompleteRegistration event handoff'
          git push origin HEAD:fix/meta-registration-funnel
