name: Audit Meta Registration Funnel

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/audit-meta-registration-funnel.yml'

permissions:
  contents: read

jobs:
  audit:
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Locate frontend and backend funnel code
        run: |
          set -euo pipefail
          echo '=== FRONTEND REGISTRATION REFERENCES ==='
          grep -RInE "sign_up|CompleteRegistration|just_registered|register|registration|auth/register|meta_event_id|event_id" src --exclude='*.map' | head -500 || true
          echo '=== BACKEND REGISTRATION / META REFERENCES ==='
          grep -RInE "CompleteRegistration|Meta.*Registration|user.created|User::created|Registered|event_id|fbc|fbp|register" backend/app backend/routes backend/tests backend/config | head -700 || true
          echo '=== ROUTE RETURN REFERENCES ==='
          grep -RInE "protected_route_intent|seller_post_intent|seller_post_returned_after_auth|Navigate to=\"/\"|navigate\('/post|navigate\('/vendedores" src | head -500 || true

      - name: Audit production registration and Meta event evidence
        run: |
          set -euo pipefail
          cd /var/www/mercasto
          sudo -n git fetch origin main --quiet
          test "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)"

          docker exec -i mercasto_backend_container php <<'PHP'
          <?php

          use Illuminate\Support\Facades\DB;
          use Illuminate\Support\Facades\Schema;

          require '/var/www/vendor/autoload.php';
          $app = require '/var/www/bootstrap/app.php';
          $app->make(Illuminate\Contracts\Console\Kernel::class)->bootstrap();

          $now = now();
          $windows = [1, 3, 7, 14, 30];
          $registrations = [];
          foreach ($windows as $days) {
              $registrations[$days . '_days'] = DB::table('users')
                  ->where('created_at', '>=', $now->copy()->subDays($days))
                  ->count();
          }

          $tables = collect(DB::select("select tablename from pg_tables where schemaname = 'public'"))
              ->pluck('tablename')
              ->filter(fn ($name) => str_contains(strtolower($name), 'meta') || str_contains(strtolower($name), 'event') || str_contains(strtolower($name), 'analytic'))
              ->values();

          $recentUsers = DB::table('users')
              ->orderByDesc('created_at')
              ->limit(20)
              ->get(['id', 'created_at', 'role', 'is_verified']);

          echo json_encode([
              'generated_at' => $now->toIso8601String(),
              'registrations' => $registrations,
              'candidate_event_tables' => $tables,
              'recent_users' => $recentUsers,
              'meta_config' => [
                  'pixel_id_present' => filled(config('services.meta.pixel_id')) || filled(env('META_PIXEL_ID')),
                  'access_token_present' => filled(config('services.meta.access_token')) || filled(env('META_ACCESS_TOKEN')),
                  'test_event_code_present' => filled(config('services.meta.test_event_code')) || filled(env('META_TEST_EVENT_CODE')),
              ],
          ], JSON_PRETTY_PRINT | JSON_UNESCAPED_UNICODE | JSON_UNESCAPED_SLASHES), PHP_EOL;
          PHP
