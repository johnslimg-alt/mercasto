name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Claude Code prompt to run manually'
        required: false
        default: '/review'

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: claude-code-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  claude:
    name: Claude Code agent
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.comment.body, '@claude')
    steps:
      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          prompt: ${{ github.event.inputs.prompt || '' }}
          claude_args: |
            --max-turns 8
            --system-prompt "Follow CLAUDE.md. Keep Mercasto production-safe. Do not print secrets. Prefer small PRs with Summary, Risk, Smoke, and Rollback. Do not bypass required checks."
