name: Paid Renewal Diagnostics

on:
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/paid-renewal-diagnostics.yml'

permissions:
  contents: read

jobs:
  paid-renewal-test:
    runs-on: ubuntu-24.04
    env:
      APP_ENV: testing
      APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      DB_CONNECTION: sqlite
      DB_DATABASE: ':memory:'
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array
      LOG_CHANNEL: stderr
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, sqlite3, pdo_sqlite
          coverage: none
      - name: Install dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist --no-progress --quiet
      - name: Run paid renewal test
        id: renewal_test
        working-directory: backend
        shell: bash
        run: |
          set +e
          ./vendor/bin/phpunit tests/Feature/PaidAdRenewalTest.php --stop-on-failure > paid-renewal-test.log 2>&1
          status=$?
          cat paid-renewal-test.log
          exit $status
      - name: Upload diagnostic log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: paid-renewal-test-log
          path: backend/paid-renewal-test.log
          if-no-files-found: error
          retention-days: 1
