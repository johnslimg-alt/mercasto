name: Server Operator

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      operation:
        description: Read-only operation to run on production runner
        required: true
        default: status
        type: choice
        options:
          - status
          - verify_quick

permissions:
  contents: read

jobs:
  operator:
    name: Server operator
    runs-on: [self-hosted, linux]
    timeout-minutes: 10
    steps:
      - name: Push compatibility
        if: github.event_name == 'push'
        run: echo "Server Operator is manual-only; push is covered by Deploy and Production checks."

      - name: Run read-only status
        if: github.event_name != 'push'
        shell: bash
        run: |
          set -euo pipefail
          cd /var/www/mercasto
          docker compose ps
          curl -fsS --max-time 30 https://mercasto.com/api/categories | head -c 300
