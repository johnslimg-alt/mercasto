name: Production checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: production-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-gates:
    name: Repository safety gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check shell scripts
        run: npm run check:scripts

      - name: Check payment retention policy
        run: npm run check:payment-retention

      - name: Check cache and PWA policy
        run: npm run check:cache-policy

  compose-config:
    name: Validate Docker Compose config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose config --no-interpolate

      - name: Validate compose file with override
        run: docker compose -f docker-compose.yml -f docker-compose.override.yml config --no-interpolate

  frontend-build:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build frontend assets
        run: npm run build

  seo-aeo-smoke:
    name: SEO/AEO production smoke
    runs-on: ubuntu-latest
    steps:
      - name: Check public search signals
        run: |
          set -euo pipefail
          curl -fsS https://mercasto.com/ >/tmp/home.html
          curl -fsS https://mercasto.com/sitemap.xml >/tmp/sitemap.xml
          curl -fsS https://mercasto.com/robots.txt >/tmp/robots.txt
          grep -Eiq '<title[^>]*>[^<]{10,70}</title>' /tmp/home.html
          grep -Eiq 'name="description"|property="og:description"' /tmp/home.html
          grep -Eiq 'application/ld\+json|schema.org' /tmp/home.html
          grep -Eiq '<urlset|<sitemapindex|<url>' /tmp/sitemap.xml
          grep -Eiq 'Sitemap:|User-agent:' /tmp/robots.txt

  frontend-docker-build:
    name: Build frontend Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -f Dockerfile .

  backend-docker-build:
    name: Build backend Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f backend/Dockerfile backend

  live-server-gate:
    name: Live server gate verify_quick
    runs-on: ubuntu-latest
    needs:
      - repository-gates
      - compose-config
      - frontend-build
      - seo-aeo-smoke
      - frontend-docker-build
      - backend-docker-build
    timeout-minutes: 20
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate SSH inputs
        env:
          SSH_HOST: ${{ secrets.MERCASTO_SSH_HOST }}
          SSH_USER: ${{ secrets.MERCASTO_SSH_USER }}
          SSH_KEY: ${{ secrets.MERCASTO_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          test -n "${SSH_HOST}" || { echo "Missing MERCASTO_SSH_HOST" >&2; exit 64; }
          test -n "${SSH_USER}" || { echo "Missing MERCASTO_SSH_USER" >&2; exit 64; }
          test -n "${SSH_KEY}" || { echo "Missing MERCASTO_SSH_PRIVATE_KEY" >&2; exit 64; }

      - name: Run read-only verify_quick gate
        env:
          SSH_HOST: ${{ secrets.MERCASTO_SSH_HOST }}
          SSH_PORT: ${{ secrets.MERCASTO_SSH_PORT }}
          SSH_USER: ${{ secrets.MERCASTO_SSH_USER }}
          SSH_KEY: ${{ secrets.MERCASTO_SSH_PRIVATE_KEY }}
          OPERATION: verify_quick
        run: bash scripts/live-server-gate.sh "${OPERATION}"