name: Production checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: production-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-gates:
    name: Repository safety gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check shell scripts
        run: npm run check:scripts

      - name: Check payment retention policy
        run: npm run check:payment-retention

      - name: Check cache and PWA policy
        run: npm run check:cache-policy

  compose-config:
    name: Validate Docker Compose config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose config --no-interpolate

      - name: Validate compose file with override
        run: docker compose -f docker-compose.yml -f docker-compose.override.yml config --no-interpolate

  frontend-build:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build frontend assets
        run: npm run build

  seo-aeo-smoke:
    name: SEO/AEO production smoke
    runs-on: ubuntu-latest
    steps:
      - name: Check public search signals
        run: |
          set -euo pipefail
          retry() {
            local attempt
            for attempt in 1 2 3 4 5 6; do
              "$@" && return 0
              echo "retrying SEO smoke command in 8s ($attempt/6): $*" >&2
              sleep 8
            done
            "$@"
          }
          retry curl -fsS --max-time 30 https://mercasto.com/ -o /tmp/home.html
          retry curl -fsS --max-time 30 https://mercasto.com/sitemap.xml -o /tmp/sitemap.xml
          retry curl -fsS --max-time 30 https://mercasto.com/robots.txt -o /tmp/robots.txt
          grep -Eiq '<title[^>]*>[^<]{10,70}</title>' /tmp/home.html
          grep -Eiq 'name="description"|property="og:description"' /tmp/home.html
          grep -Eiq 'application/ld\+json|schema.org' /tmp/home.html
          grep -Eiq '<urlset|<sitemapindex|<url>' /tmp/sitemap.xml
          grep -Eiq 'Sitemap:|User-agent:' /tmp/robots.txt

  frontend-docker-build:
    name: Build frontend Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -f Dockerfile .

  backend-docker-build:
    name: Build backend Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f backend/Dockerfile backend

  live-server-gate:
    name: Live server gate verify_quick
    # Runs on the self-hosted runner that lives on the production server:
    # GitHub-hosted runners cannot reach the VPS SSH port (firewall), which made
    # this gate fail on every PR. Executes ONLY the server-resident script from
    # /var/www/mercasto (never PR code), read-only, same pattern as
    # autonomous-server-live-gate.yml.
    runs-on: [self-hosted, linux]
    needs:
      - repository-gates
      - compose-config
      - seo-aeo-smoke
    timeout-minutes: 20
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - name: Verify production checkout exists
        shell: bash
        run: |
          set -euo pipefail
          test -d /var/www/mercasto
          test -f /var/www/mercasto/scripts/server-operator.sh

      - name: Run read-only verify_quick gate
        shell: bash
        run: |
          set -euo pipefail
          cd /var/www/mercasto
          bash scripts/server-operator.sh verify_quick
