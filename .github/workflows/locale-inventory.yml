name: Locale Inventory

on:
  push:
    branches:
      - feat/localize-ad-expiry-countdown
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  inventory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build locale inventory
        run: |
          mkdir -p locale-inventory
          cp src/i18n.js locale-inventory/i18n.js
          cp src/utils/adExpiryCountdown.js locale-inventory/adExpiryCountdown.js
          cp src/main.jsx locale-inventory/main.jsx
          cp -R src/locales locale-inventory/locales
          find src/locales -maxdepth 1 -type f -name '*.json' -printf '%f\n' | sort > locale-inventory/locale-files.txt
          grep -RIn --exclude='*.map' -E 'Termina en|Finalizado|expires_at|expiry countdown' src > locale-inventory/countdown-references.txt || true
      - name: Upload locale inventory
        uses: actions/upload-artifact@v4
        with:
          name: locale-inventory
          path: locale-inventory
          retention-days: 1
