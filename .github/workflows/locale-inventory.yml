name: Apply Countdown Localizations

on:
  push:
    branches:
      - feat/localize-ad-expiry-countdown

permissions:
  contents: write

jobs:
  localize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/localize-ad-expiry-countdown
      - name: Apply all countdown translations
        run: |
          python3 scripts/localize_ad_expiry.py
          node --check src/utils/adExpiryCountdown.js
          git diff --check
      - name: Commit generated localization changes
        run: |
          if git diff --quiet; then
            echo 'Localization files are already up to date.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/locales src/utils/adExpiryCountdown.js
          git commit -m 'feat: localize ad expiry countdown in all languages'
          git push origin HEAD:feat/localize-ad-expiry-countdown
