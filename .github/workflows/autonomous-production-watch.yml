name: Autonomous Production Watch

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/autonomous-production-watch.yml'
      - 'docker-compose.yml'
      - 'docker-compose.override.yml'
      - 'package.json'
      - 'scripts/static-safety-scans.sh'
  schedule:
    - cron: '17 */6 * * *'

permissions:
  contents: read
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: autonomous-production-watch
  cancel-in-progress: false

jobs:
  public-watch:
    name: Public production watch
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Check public endpoints
        shell: bash
        run: |
          set -euo pipefail
          check_head() {
            local url="$1"
            local pattern="$2"
            local attempt
            local status
            for attempt in 1 2 3 4 5 6; do
              status="$(curl -k -sS -o /dev/null -w '%{http_code}' --max-time 30 "$url" || true)"
              status="${status:-000}"
              echo "$url -> $status (attempt $attempt/6)"
              if [[ "$status" =~ $pattern ]]; then
                return 0
              fi
              sleep 8
            done
            echo "unexpected status for $url after retries: $status" >&2
            exit 1
          }
          check_head https://mercasto.com/up '^200$'
          check_head https://mercasto.com/ '^(200|301|302)$'
          check_head https://mercasto.com/api/categories '^200$'
          check_head 'https://mercasto.com/api/ads?page=1' '^200$'
          check_head https://mercasto.com/api/auth/providers '^200$'

      - name: Check public search signals
        shell: bash
        run: |
          set -euo pipefail
          retry() {
            local attempt
            for attempt in 1 2 3 4 5 6; do
              "$@" && return 0
              echo "retrying public search command in 8s ($attempt/6): $*" >&2
              sleep 8
            done
            "$@"
          }
          retry curl -fsS --max-time 30 https://mercasto.com/ -o /tmp/home.html
          retry curl -fsS --max-time 30 https://mercasto.com/sitemap.xml -o /tmp/sitemap.xml
          retry curl -fsS --max-time 30 https://mercasto.com/robots.txt -o /tmp/robots.txt
          grep -Eiq '<title[^>]*>[^<]{10,70}</title>' /tmp/home.html
          grep -Eiq 'name="description"|property="og:description"' /tmp/home.html
          grep -Eiq 'application/ld\+json|schema.org' /tmp/home.html
          grep -Eiq '<urlset|<sitemapindex|<url>' /tmp/sitemap.xml
          grep -Eiq 'Sitemap:|User-agent:' /tmp/robots.txt

      - name: Check public denial paths
        shell: bash
        run: |
          set -euo pipefail
          check_head() {
            local url="$1"
            local pattern="$2"
            local attempt
            local status
            for attempt in 1 2 3 4 5 6; do
              status="$(curl -k -sS -o /dev/null -w '%{http_code}' --max-time 30 "$url" || true)"
              status="${status:-000}"
              echo "$url -> $status (attempt $attempt/6)"
              if [[ "$status" =~ $pattern ]]; then
                return 0
              fi
              sleep 8
            done
            echo "unexpected status for $url after retries: $status" >&2
            exit 1
          }
          for path in \
            /.env \
            /.git/config \
            /backend/.env \
            /composer.json \
            /composer.lock \
            /package.json \
            /package-lock.json \
            /pnpm-lock.yaml \
            /yarn.lock \
            /vite.config.js \
            /vite.config.ts \
            /vite.config.mjs \
            /tailwind.config.js \
            /tailwind.config.ts \
            /tailwind.config.mjs \
            /horizon \
            /vendor/horizon
          do
            check_head "https://mercasto.com${path}" '^(403|404|410)$'
          done

  repository-watch:
    name: Repository static watch
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check scripts
        run: npm run check:scripts

      - name: Run static safety scans
        run: npm run check:static-safety

      - name: Validate compose config
        run: |
          DB_PASSWORD=ci REDIS_PASSWORD=ci GRAFANA_PASSWORD=ci docker compose config >/tmp/mercasto-compose-base.yml
          DB_PASSWORD=ci REDIS_PASSWORD=ci GRAFANA_PASSWORD=ci docker compose -f docker-compose.yml -f docker-compose.override.yml config >/tmp/mercasto-compose-prod.yml

  report-failure:
    name: Report watch failure
    runs-on: ubuntu-latest
    needs:
      - public-watch
      - repository-watch
    if: failure()
    timeout-minutes: 5
    steps:
      - name: Create or update production watch issue
        uses: actions/github-script@v9
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const marker = 'AUTONOMOUS_PRODUCTION_WATCH_INCIDENT';
            const title = 'Autonomous production watch failing';
            const body = [
              marker,
              '',
              'Autonomous Production Watch failed.',
              '',
              `Latest failed run: ${runUrl}`,
              '',
              'Required action:',
              '- inspect the failed job log;',
              '- fix the smallest reproducible cause;',
              '- rerun the failed workflow or run `npm run verify:quick` from production checkout;',
              '- do not close this issue until the watch is green again.',
              '',
              'Safety boundary: this workflow is read-only. It does not deploy, migrate, restart services, or mutate production data.'
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'autonomous-watch,incident',
              per_page: 20
            });
            const existing = issues.find(issue => issue.title === title || (issue.body || '').includes(marker));
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Still failing. Latest run: ${runUrl}`
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['production', 'autonomous-watch', 'incident']
              });
            }
