name: Legal Readiness Evidence

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'public/reembolsos/**'
      - 'public/moderacion/**'
      - 'public/sitemap.xml'
      - 'scripts/legal-readiness-smoke.sh'
      - 'scripts/seo-public-audit.mjs'
      - 'tests/e2e/public-smoke.spec.js'
      - 'playwright.config.js'
      - '.github/workflows/legal-readiness.yml'

jobs:
  legal-readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Legal readiness smoke strict
        env:
          BASE_URL: https://mercasto.com
          REQUIRE_LEGAL_READY: '1'
        run: npm run smoke:legal-readiness

      - name: SEO public audit
        env:
          BASE_URL: https://mercasto.com
        run: npm run smoke:seo

      - name: Public E2E smoke
        env:
          BASE_URL: https://mercasto.com
          CI: '1'
        run: npm run e2e:public:ci

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: legal-readiness-playwright-report
          path: playwright-report
          if-no-files-found: ignore
