name: Issue Launch Evidence Trigger

on:
  workflow_dispatch:
  issues:
    types: [opened]

permissions:
  contents: read

jobs:
  launch-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run launch artifact inventory
        run: bash scripts/launch-artifact-inventory.sh
      - name: Run launch status summary
        run: bash scripts/launch-status-summary.sh
