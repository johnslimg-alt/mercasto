name: Finish Catalog Detail Integrity

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - 'src/components/screens/AdDetailScreen.jsx'
      - 'scripts/check-recovery-guards.mjs'
      - 'scripts/patch_catalog_*_final.py'
      - '.github/workflows/pr-catalog-detail-finish.yml'

concurrency:
  group: catalog-detail-finish-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Patch catalog detail behavior
        run: |
          python3 scripts/patch_catalog_detail_final.py
          python3 scripts/patch_catalog_seller_final.py

      - name: Verify final catalog behavior
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set +e
          {
            npm ci --no-audit --no-fund
            npm run check:recovery
            npm run lint:ci
            npm run build
            php -l backend/app/Http/Controllers/Api/AdController.php
          } > /tmp/catalog-detail.log 2>&1
          code=$?
          set -e
          cat /tmp/catalog-detail.log

          if [ "$code" -ne 0 ]; then
            {
              echo '### Catalog detail verification diagnostics'
              echo
              echo '```text'
              tail -140 /tmp/catalog-detail.log
              echo '```'
            } > /tmp/catalog-comment.md
            python3 - <<'PY' > /tmp/catalog-comment.json
          import json
          from pathlib import Path
          print(json.dumps({'body': Path('/tmp/catalog-comment.md').read_text()}))
          PY
            curl -fsS --retry 3 --retry-all-errors \
              -X POST \
              -H 'Accept: application/vnd.github+json' \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
              --data-binary @/tmp/catalog-comment.json
            exit "$code"
          fi

      - name: Commit and remove temporary tooling
        run: |
          rm -f \
            .github/workflows/pr-catalog-detail-finish.yml \
            scripts/patch_catalog_detail_final.py \
            scripts/patch_catalog_seller_final.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Remove synthetic detail activity and disclose catalog references'
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
