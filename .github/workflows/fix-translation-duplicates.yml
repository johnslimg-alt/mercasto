name: Fix branch cleanup

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'fix/complete-registration-capi-dedup'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Remove duplicate translation definitions if present
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const dir = path.join(process.cwd(), 'src/constants/translations');
          const files = fs.readdirSync(dir).filter((name) => name.endsWith('.js')).sort();
          const keys = ['change_photo', 'save_changes'];

          for (const name of files) {
            const file = path.join(dir, name);
            const lines = fs.readFileSync(file, 'utf8').split('\n');
            const removals = new Set();

            for (const key of keys) {
              const matcher = new RegExp(`^\\s*(?:"${key}"|'${key}'|${key})\\s*:`);
              const matches = [];
              lines.forEach((line, index) => {
                if (matcher.test(line)) matches.push(index);
              });

              if (matches.length === 2) {
                removals.add(matches[0]);
              } else if (matches.length !== 1) {
                throw new Error(`${name}: expected one or two ${key} definitions, found ${matches.length}`);
              }
            }

            const next = lines.filter((_, index) => !removals.has(index)).join('\n');
            fs.writeFileSync(file, next);
          }
          NODE

      - name: Remove retired public registration CAPI route
        run: |
          sed -i "/Route::post('\/meta\/events\/register', \[MetaEventController::class, 'register'\]);/d" backend/routes/api.php

      - name: Commit cleanup
        run: |
          if git diff --quiet; then
            echo "Branch cleanup is already applied."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/constants/translations backend/routes/api.php
          git commit -m "fix: retire public registration CAPI route"
          git push origin HEAD:${{ github.head_ref }}
