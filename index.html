<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/icon-192x192.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Compra, vende y renta en todo México con Mercasto. Publica anuncios, encuentra autos, inmuebles, servicios, empleo y productos cerca de ti." />
    <link rel="canonical" href="https://mercasto.com/" />
    <meta name="theme-color" content="#84CC16">
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Mercasto" />
    <meta property="og:title" content="Mercasto | Compra, Vende y Renta en Todo México" />
    <meta property="og:description" content="Marketplace de clasificados para México: autos, inmuebles, servicios, empleo, electrónica y más." />
    <meta property="og:url" content="https://mercasto.com/" />
    <meta property="og:image" content="https://mercasto.com/icon-512x512.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mercasto | Compra, Vende y Renta en Todo México" />
    <meta name="twitter:description" content="Compra, vende y renta en todo México con Mercasto." />
    <meta name="twitter:image" content="https://mercasto.com/icon-512x512.png" />
    <link rel="manifest" href="/manifest.json">
    <title>Mercasto | Compra, Vende y Renta en Todo México</title>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Mercasto",
        "url": "https://mercasto.com/",
        "inLanguage": "es-MX",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://mercasto.com/?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  </head>
  <body class="antialiased bg-[#F8FAFC]">
    <script>
      if (typeof window.Notification === 'undefined') {
        window.Notification = function NotificationFallback() { return null; };
        window.Notification.permission = 'denied';
        window.Notification.requestPermission = function() { return Promise.resolve('denied'); };
      }

      function showBootMessage(title, message) {
        var root = document.getElementById('root');
        if (!root || root.innerHTML.trim() !== '') return;
        root.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;background:#f8fafc;color:#0f172a;"><div style="max-width:440px;background:white;border:1px solid #e2e8f0;border-radius:20px;padding:24px;box-shadow:0 20px 60px rgba(15,23,42,.12);"><h1 style="font-size:24px;margin:0 0 12px;font-weight:800;">' + title + '</h1><p style="font-size:16px;line-height:1.5;margin:0;color:#475569;">' + message + '</p><button onclick="location.reload()" style="margin-top:18px;background:#84cc16;color:#111827;border:0;border-radius:12px;padding:12px 16px;font-weight:700;">Reintentar</button></div></div>';
      }

      window.addEventListener('error', function(event) {
        showBootMessage('Mercasto no pudo cargar', 'Actualiza la página. Si sigue igual, borra los datos del sitio en Safari/Chrome e intenta de nuevo.');
      });

      window.addEventListener('unhandledrejection', function() {
        showBootMessage('Mercasto no pudo cargar', 'Actualiza la página. Si sigue igual, borra los datos del sitio en Safari/Chrome e intenta de nuevo.');
      });

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          registrations.forEach(function(registration) {
            registration.unregister();
          });
        }).catch(function() {});
      }

      window.addEventListener('load', function() {
        setTimeout(function() {
          showBootMessage('Mercasto está actualizando', 'Estamos recargando la app. Pulsa Reintentar en unos segundos.');
        }, 3500);
      });
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
