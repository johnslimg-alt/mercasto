<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <link rel="shortcut icon" href="/favicon.svg?v=2" />
    <link rel="apple-touch-icon" href="/icon-192x192.png?v=2">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#84CC16">
    <link rel="manifest" href="/manifest.json">
    <title>Mercasto | Compra, Vende y Renta en Todo México</title>
  </head>
  <body class="antialiased bg-[#F8FAFC]">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js?v=1.1.0').then(reg => {
            reg.onupdatefound = () => {
              const installingWorker = reg.installing;
              installingWorker.onstatechange = () => {
                if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  if (confirm('¡Nueva versión de Mercasto disponible! Haz clic en Aceptar para actualizar.')) {
                    window.location.reload();
                  }
                }
              };
            };
          }).catch(err => console.log('SW ref error', err));
        });
      }
    </script>
  </body>
</html>
