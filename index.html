    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      (function () {
        var GA_ID = 'G-VX87HQC817';
        var loaded = false;
        function loadGA() {
          if (loaded) return;
          loaded = true;
          var s = document.createElement('script');
          s.async = true;
          s.src = 'https://www.googletagmanager.com/gtag/js?id=' + GA_ID;
          document.head.appendChild(s);
          gtag('js', new Date());
          gtag('config', GA_ID);
        }
        var idle = window.requestIdleCallback || function (cb) { return setTimeout(cb, 2000); };
        function schedule() { idle(loadGA); }
        if (document.readyState === 'complete') {
          schedule();
        } else {
          window.addEventListener('load', schedule, { once: true });
        }
        // Guarantee GA fires on first interaction even if the page never goes idle.
        ['scroll', 'click', 'keydown', 'touchstart', 'pointerdown'].forEach(function (ev) {
          window.addEventListener(ev, loadGA, { once: true, passive: true });
        });
      })();

    <script>
      try {
        var theme = localStorage.getItem('theme');
        document.documentElement.classList.toggle('dark', theme === 'dark' || !theme);
        var url = new URL(window.location.href);
        if (url.searchParams.has('refresh')) {
          url.searchParams.delete('refresh');
          window.history.replaceState({}, document.title, url.pathname + url.search + url.hash);
        }
      } catch (e) {}
    </script>

  <body class="antialiased bg-[#F8FAFC] dark:bg-slate-950">
    <script>
      if (typeof window.Notification === 'undefined') {
        window.Notification = function NotificationFallback() { return null; };
        window.Notification.permission = 'denied';
        window.Notification.requestPermission = function() { return Promise.resolve('denied'); };
      }

      function showBootMessage(title, message) {
        var root = document.getElementById('root');
        if (!root || root.innerHTML.trim() !== '') return;
        root.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;background:#f8fafc;color:#0f172a;"><div style="max-width:440px;background:white;border:1px solid #e2e8f0;border-radius:20px;padding:24px;box-shadow:0 20px 60px rgba(15,23,42,.12);"><h1 style="font-size:24px;margin:0 0 12px;font-weight:800;">' + title + '</h1><p style="font-size:16px;line-height:1.5;margin:0;color:#475569;">' + message + '</p><button onclick="location.reload()" style="margin-top:18px;background:#84cc16;color:#111827;border:0;border-radius:12px;padding:12px 16px;font-weight:700;">Reintentar</button></div></div>';
      }

      window.addEventListener('error', function(event) {
        showBootMessage('Mercasto no pudo cargar', 'Actualiza la página. Si sigue igual, borra los datos del sitio en Safari/Chrome e intenta de nuevo.');
      });

      window.addEventListener('unhandledrejection', function() {
        showBootMessage('Mercasto no pudo cargar', 'Actualiza la página. Si sigue igual, borra los datos del sitio en Safari/Chrome e intenta de nuevo.');
      });

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          registrations.forEach(function(registration) {
            registration.unregister();
          });
        }).catch(function() {});
      }
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
