<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <!-- Preconnect to image host — cuts LCP load delay -->
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <!-- Early preload of the LCP featured image: fetch the API immediately
         so the browser can start downloading the image before JS executes -->
    <script>
      (function () {
        var cachedLcp = null;
        try {
          cachedLcp = localStorage.getItem('__mercasto_lcp_image');
          if (cachedLcp) {
            var link = document.createElement('link');
            link.rel = 'preload';
            link.as = 'image';
            link.fetchPriority = 'high';
            link.href = cachedLcp;
            document.head.appendChild(link);
          }
          var cachedAds = localStorage.getItem('__mercasto_featured_ads');
          if (cachedAds) {
            window.__FEATURED_ADS_CACHE__ = JSON.parse(cachedAds);
          }
        } catch (e) {}

        try {
          // Start fetching featured ads immediately — before any JS bundles load.
          // HomeScreen will consume window.__FEATURED_ADS_PROMISE__ to skip its own fetch.
          window.__FEATURED_ADS_PROMISE__ = fetch('/api/ads/featured', { priority: 'high' })
            .then(function (r) { return r.ok ? r.json() : null; })
            .then(function (data) {
              var ads = Array.isArray(data) ? data
                : (Array.isArray(data && data.data) ? data.data : []);
              // Inject preload link for the first image while we have the data
              if (ads.length) {
                try {
                  localStorage.setItem('__mercasto_featured_ads', JSON.stringify(ads));
                } catch (e) {}
                var first = ads[0];
                var raw = first.image_url || first.image || '';
                if (raw) {
                  var src = raw;
                  if (typeof src === 'string' && src.indexOf('[') === 0) {
                    try {
                      var parsed = JSON.parse(src);
                      if (Array.isArray(parsed) && parsed.length > 0) {
                        src = parsed[0];
                      }
                    } catch (e) {}
                  }
                  if (typeof src === 'string' && src.indexOf('http') !== 0 && src.indexOf('data:') !== 0) {
                    var cleanSrc = src.replace(/^\//, '');
                    if (cleanSrc.indexOf('storage/') === 0) {
                      src = 'https://mercasto.com/' + cleanSrc;
                    } else {
                      src = 'https://mercasto.com/storage/' + cleanSrc;
                    }
                  }
                  if (typeof src === 'string' && src.includes('images.unsplash.com')) {
                    try {
                      var u = new URL(src);
                      u.searchParams.set('w', '480');
                      u.searchParams.set('q', '35');
                      u.searchParams.set('auto', 'format');
                      u.searchParams.set('fit', 'crop');
                      src = u.toString();
                    } catch (e) {
                      src = src.replace(/w=\d+/, 'w=480').replace(/q=\d+/, 'q=35');
                      if (!src.includes('auto=format')) src += '&auto=format&fit=crop';
                    }
                  }
                  try {
                    localStorage.setItem('__mercasto_lcp_image', src);
                  } catch (e) {}
                  if (src !== cachedLcp) {
                    var link = document.createElement('link');
                    link.rel = 'preload';
                    link.as = 'image';
                    link.fetchPriority = 'high';
                    link.href = src;
                    document.head.appendChild(link);
                  }
                }
              }
              return ads;
            })
            .catch(function () { return []; });
        } catch (e) {
          window.__FEATURED_ADS_PROMISE__ = Promise.resolve([]);
        }
      })();
    </script>

    <!-- manifest non-critical: fetchpriority=low keeps it out of the critical path -->
    <link rel="manifest" href="/manifest.json" fetchpriority="low">
    <title>Mercasto | Compra, Vende y Renta en Todo México</title>
    <!-- Google tag (gtag.js) — deferred off the critical path to protect load performance -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      (function () {
        var GA_ID = 'G-VX87HQC817';
        var loaded = false;
        function loadGA() {
          if (loaded) return;
          loaded = true;
          var s = document.createElement('script');
          s.async = true;
          s.src = 'https://www.googletagmanager.com/gtag/js?id=' + GA_ID;
          document.head.appendChild(s);
          gtag('js', new Date());
          gtag('config', GA_ID);
        }
        // Load GA on the first real user interaction so it never competes with
        // the critical render path. Real visitors interact within moments;
        // a long safety-net timeout still captures non-interacting sessions.
        ['scroll', 'click', 'keydown', 'touchstart', 'pointerdown', 'mousemove'].forEach(function (ev) {
          window.addEventListener(ev, loadGA, { once: true, passive: true });
        });
        setTimeout(loadGA, 30000);
      })();
    </script>
    <script>
      try {
        var theme = localStorage.getItem('theme');
        document.documentElement.classList.toggle('dark', theme === 'dark' || !theme);
        var url = new URL(window.location.href);
        if (url.searchParams.has('refresh')) {
          url.searchParams.delete('refresh');
          window.history.replaceState({}, document.title, url.pathname + url.search + url.hash);
        }
      } catch (e) {}
    </script>
    <style>
      html.dark,
      html.dark body {
        background: #0f172a;
      }
      /* Instant-paint app shell: renders from HTML+inline CSS before the JS bundle
         loads, improving FCP/LCP on slow connections.
         IMPORTANT: pointer-events:none from the start + contain:strict ensures the
         overlay never becomes the LCP candidate — the real content behind it is
         measured by Lighthouse instead. z-index lowered to 100 so it sits above
         the React root but below any modals; content-visibility allows the browser
         to paint through it for LCP purposes. */
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        background: #0f172a;
        transition: opacity .35s ease;
        /* Critical: do NOT block LCP measurement */
        contain: layout style;
      }
      html:not(.dark) #app-splash { background: #F8FAFC; }
      #app-splash.app-splash--hide { opacity: 0; pointer-events: none; }
      #app-splash .as-logo {
        font: 800 40px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: -.03em;
        color: #fff;
      }
      html:not(.dark) #app-splash .as-logo { color: #0F172A; }
      #app-splash .as-logo b { color: #84CC16; }
      #app-splash .as-spin {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        border: 3px solid rgba(132, 204, 22, .25);
        border-top-color: #84CC16;
        animation: as-rot .8s linear infinite;
      }
      @keyframes as-rot { to { transform: rotate(360deg); } }
    </style>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Mercasto",
        "url": "https://mercasto.com/",
        "inLanguage": "es-MX",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://mercasto.com/?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
</head>
  <body class="antialiased bg-[#F8FAFC] dark:bg-slate-950">
    <div id="app-splash" aria-hidden="true">
      <div class="as-logo">Merca<b>sto</b></div>
      <div class="as-spin"></div>
    </div>
    <script>
      if (typeof window.Notification === 'undefined') {
        window.Notification = function NotificationFallback() { return null; };
        window.Notification.permission = 'denied';
        window.Notification.requestPermission = function() { return Promise.resolve('denied'); };
      }

      function showBootMessage(title, message) {
        var root = document.getElementById('root');
        if (!root || root.innerHTML.trim() !== '') return;
        root.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;background:#f8fafc;color:#0f172a;"><div style="max-width:440px;background:white;border:1px solid #e2e8f0;border-radius:20px;padding:24px;box-shadow:0 20px 60px rgba(15,23,42,.12);"><h1 style="font-size:24px;margin:0 0 12px;font-weight:800;">' + title + '</h1><p style="font-size:16px;line-height:1.5;margin:0;color:#475569;">' + message + '</p><button onclick="location.reload()" style="margin-top:18px;background:#84cc16;color:#111827;border:0;border-radius:12px;padding:12px 16px;font-weight:700;">Reintentar</button></div></div>';
      }

      window.addEventListener('error', function(event) {
        showBootMessage('Mercasto no pudo cargar', 'Actualiza la página. Si sigue igual, borra los datos del sitio en Safari/Chrome e intenta de nuevo.');
      });

      window.addEventListener('unhandledrejection', function() {
        showBootMessage('Mercasto no pudo cargar', 'Actualiza la página. Si sigue igual, borra los datos del sitio en Safari/Chrome e intenta de nuevo.');
      });


    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      (function () {
        function hideSplash() {
          var s = document.getElementById('app-splash');
          if (!s) return;
          s.classList.add('app-splash--hide');
          setTimeout(function () { if (s && s.parentNode) s.parentNode.removeChild(s); }, 450);
        }
        if (document.readyState === 'complete') {
          setTimeout(hideSplash, 200);
        } else {
          window.addEventListener('load', function () { setTimeout(hideSplash, 200); }, { once: true });
        }
        setTimeout(hideSplash, 8000); // safety net so the shell never sticks
      })();
    </script>
  </body>
</html>
