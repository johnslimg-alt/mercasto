<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M50 5 C27.9 5 10 22.9 10 45 C10 75 50 95 50 95 C50 95 90 75 90 45 C90 22.9 72.1 5 50 5 Z' fill='%2384CC16'/><path d='M30 60 L30 35 L50 50 L70 35 L70 60' fill='none' stroke='%23ffffff' stroke-width='8' stroke-linecap='round' stroke-linejoin='round'/></svg>" />
    <link rel="apple-touch-icon" href="/icon-192x192.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#84CC16">
    <link rel="manifest" href="/manifest.json">
    <title>Mercasto | Compra, Vende y Renta en Todo México</title>
    <script defer src="https://maps.googleapis.com/maps/api/js?key=%VITE_GOOGLE_MAPS_API_KEY%&libraries=places&callback=Function.prototype"></script>
  </head>
  <body class="antialiased bg-[#F8FAFC]">
    <!-- ГЛОБАЛЬНЫЙ ПЕРЕХВАТЧИК ОШИБОК ИНИЦИАЛИЗАЦИИ JS -->
    <script>
      window.addEventListener('error', function(event) {
        document.body.innerHTML = '<div style="padding: 20px; font-family: monospace; background: #fef2f2; color: #dc2626; word-break: break-all; z-index: 9999; position: relative;">' +
          '<h2 style="font-size: 20px; font-weight: bold; margin-bottom: 10px;">¡Error fatal de inicialización!</h2>' +
          '<b>Mensaje:</b> ' + event.message + '<br><br>' + 
          '<b>Archivo:</b> ' + event.filename + ':' + event.lineno + '<br><br>' +
          '<b>Stack Trace:</b><pre style="font-size: 12px; margin-top: 10px;">' + (event.error && event.error.stack ? event.error.stack : 'N/A') + '</pre>' +
          '</div>';
      });
    </script>

    <!-- SENTRY APM AGENT (Автоматический отлов белого экрана React) -->
    <script src="https://browser.sentry-cdn.com/7.105.0/bundle.tracing.min.js" crossorigin="anonymous"></script>
    <script>
      Sentry.init({
        dsn: "https://public@sentry.example.com/1", // Замените на свой DSN в будущем
        tracesSampleRate: 1.0,
      });
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js?v=1.2.0').then(reg => {
            reg.onupdatefound = () => {
              const installingWorker = reg.installing;
              installingWorker.onstatechange = () => {
                if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  if (confirm('¡Nueva versión de Mercasto disponible! Haz clic en Aceptar para actualizar.')) {
                    window.location.reload();
                  }
                }
              };
            };
          }).catch(err => console.log('SW ref error', err));
        });
      }
    </script>
  </body>
</html>
