<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M50 5 C27.9 5 10 22.9 10 45 C10 75 50 95 50 95 C50 95 90 75 90 45 C90 22.9 72.1 5 50 5 Z' fill='%2384CC16'/><path d='M30 60 L30 35 L50 50 L70 35 L70 60' fill='none' stroke='%23ffffff' stroke-width='8' stroke-linecap='round' stroke-linejoin='round'/></svg>" />
    <link rel="apple-touch-icon" href="/icon-192x192.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#84CC16">
    <link rel="manifest" href="/manifest.json">
    <title>Mercasto | Compra, Vende y Renta en Todo México</title>
    <script defer src="https://maps.googleapis.com/maps/api/js?key=%VITE_GOOGLE_MAPS_API_KEY%&libraries=places&callback=Function.prototype"></script>
  </head>
  <body class="antialiased bg-[#F8FAFC]">
    <!-- ГЛОБАЛЬНЫЙ ПЕРЕХВАТЧИК ОШИБОК ИНИЦИАЛИЗАЦИИ JS -->
    <script>
      // 1. УБИВАЕМ ЗАСТРЯВШИЙ SERVICE WORKER (Главная причина вечного белого экрана)
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          for(let reg of regs) { reg.unregister(); }
        });
      }

      // 2. БЕЗОПАСНЫЙ ПЕРЕХВАТЧИК (Не удаляет React-приложение)
      window.addEventListener('error', function(event) {
        var errDiv = document.createElement('div');
        errDiv.style.cssText = 'padding: 20px; font-family: monospace; background: #fef2f2; color: #dc2626; word-break: break-all; z-index: 9999; position: fixed; top: 0; left: 0; right: 0; border-bottom: 2px solid #f87171; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);';
        errDiv.innerHTML = '<h2 style="font-size: 20px; font-weight: bold; margin-bottom: 10px;">¡Error fatal de inicialización!</h2><b>Mensaje:</b> ' + event.message;
        document.body.appendChild(errDiv);
      });
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
